<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Belladonna Training — Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div class="loading-wrap" id="loading"><div class="spinner"></div><p>Loading...</p></div>

  <main id="main" style="display:none;">
    <div class="page-wrap">

      <div class="fade-up" style="margin-bottom:2rem;">
        <p style="font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-style:normal;">Welcome back,</p>
        <h1 id="user-name">Host</h1>
        <p id="cert-banner" style="display:none;margin-top:0.75rem;color:var(--success);font-weight:500;font-size:15px;font-family:var(--cinzel);letter-spacing:.06em;font-style:normal;">✦ Belladonna Certified Host</p>
        <p id="cert-tagline" style="margin-top:0.5rem;">Complete all modules to earn your Belladonna Certified Host credential.</p>
      </div>

      <div class="card fade-up" style="margin-bottom:1.5rem;animation-delay:.05s;">
        <div class="flex justify-between items-center" style="margin-bottom:10px;">
          <span style="font-family:var(--cinzel);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);">Overall Progress</span>
          <span id="prog-label" style="font-family:var(--cinzel);font-size:11px;letter-spacing:.06em;color:var(--gold);">0 / 0 modules</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <p id="prog-note" style="display:none;font-size:13px;color:var(--warning);margin-top:10px;font-style:normal;font-family:var(--font);">
          All quizzes passed! Your manager will schedule your Dry Run to complete certification.
        </p>
      </div>

      <div id="module-list"></div>

      <div class="card fade-up" style="margin-top:1.5rem;animation-delay:.5s;">
        <h3 style="margin-bottom:1rem;">Certification Checklist</h3>
        <div id="cert-checklist"></div>
      </div>

    </div>
  </main>

  <div class="toast-wrap" id="toast-wrap"></div>

  <script type="module">
    import { requireAuth, renderNav, loadModules, loadUserProgress, getModuleStatus, doLogout, db } from "./firebase-init.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window._logout = doLogout;

    requireAuth(async (user, profile) => {
      document.getElementById("nav-placeholder").innerHTML = renderNav(profile, profile.role === "admin");

      const [modules, progress] = await Promise.all([loadModules(), loadUserProgress(user.uid)]);
      const certSnap = await getDoc(doc(db, "certifications", user.uid));
      const cert = certSnap.exists() ? certSnap.data() : {};

      document.getElementById("user-name").textContent = profile.name || "Host";
      if (profile.certified) {
        document.getElementById("cert-banner").style.display = "block";
        document.getElementById("cert-tagline").style.display = "none";
      }

      const passed = modules.filter(m => progress[m.id]?.status === "passed").length;
      const pct = modules.length ? Math.round((passed / modules.length) * 100) : 0;
      document.getElementById("prog-fill").style.width = pct + "%";
      document.getElementById("prog-label").textContent = `${passed} / ${modules.length} modules`;
      if (passed === modules.length && !profile.certified) {
        document.getElementById("prog-note").style.display = "block";
      }

      // Module list
      const list = document.getElementById("module-list");
      modules.forEach((mod, idx) => {
        const status = getModuleStatus(modules, progress, idx);
        const locked = status === "locked";
        const prog = progress[mod.id];

        const statusBadge = {
          passed: `<span class="badge badge-pass">Passed</span>`,
          failed: `<span class="badge badge-fail">Retake</span>`,
          in_progress: `<span class="badge badge-active">In Progress</span>`,
          available: `<span class="badge badge-active">Start</span>`,
          locked: `<span class="badge badge-locked">Locked</span>`,
        }[status];

        const circleClass = status === "passed" ? "done" : locked ? "locked" : "current";
        const scoreNote = prog?.quizScore != null ? ` · Quiz: ${prog.quizScore}/${mod.totalQuestions||5}` : "";

        if (locked) {
          list.innerHTML += `
            <div class="module-row locked" style="animation-delay:${0.07*idx+0.1}s;">
              <div class="mod-circle locked">${idx+1}</div>
              <div style="flex:1;">
                <div style="font-family:var(--cinzel);font-size:13px;font-weight:600;letter-spacing:.04em;margin-bottom:2px;">${mod.title||"Module "+(idx+1)}</div>
                <div class="text-muted">${mod.description||""}${scoreNote}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">${statusBadge}</div>
            </div>`;
        } else {
          list.innerHTML += `
            <a href="modules.html?id=${mod.id}" class="module-row ${status==="in_progress"?"active-module":""} fade-up" style="animation-delay:${0.07*idx+0.1}s;">
              <div class="mod-circle ${circleClass}">${status==="passed"?"✓":idx+1}</div>
              <div style="flex:1;">
                <div style="font-family:var(--cinzel);font-size:13px;font-weight:600;letter-spacing:.04em;margin-bottom:2px;">${mod.title||"Module "+(idx+1)}</div>
                <div class="text-muted">${mod.description||""}${scoreNote}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">${statusBadge}<span style="color:var(--gold);">→</span></div>
            </a>`;
        }
      });

      // Cert checklist
      const steps = [
        {key:"quizzesPassed",label:"All module quizzes passed"},
        {key:"dryRunComplete",label:"Dry run completed",dateKey:"dryRunDate"},
        {key:"shadowGigComplete",label:"Shadow gig attended",dateKey:"shadowGigDate"},
        {key:"soloLaunchComplete",label:"Solo launch completed",dateKey:"soloLaunchDate"},
      ];
      const cl = document.getElementById("cert-checklist");
      steps.forEach(step => {
        const done = cert[step.key];
        const dateVal = step.dateKey && cert[step.dateKey];
        const dateStr = dateVal ? new Date(dateVal.seconds*1000).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "";
        cl.innerHTML += `
          <div class="check-row">
            <div class="check-dot ${done?"done":"pending"}">${done?"✓":"○"}</div>
            <span style="flex:1;color:${done?"var(--text)":"var(--text3)"};">${step.label}</span>
            <span class="text-muted">${done?(dateStr||"Complete"):"Pending"}</span>
          </div>`;
      });

      document.getElementById("loading").style.display = "none";
      document.getElementById("main").style.display = "block";
    });
  </script>
</body>
</html>
