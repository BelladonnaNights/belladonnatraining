<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Belladonna Training — Modules</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .layout { display:grid; grid-template-columns:280px 1fr; min-height:calc(100vh - 64px); width:100%; }
    @media(max-width:768px){ .layout{grid-template-columns:1fr;} .sidebar{display:none;} .sidebar.open{display:block;position:fixed;inset:0;z-index:300;overflow-y:auto;} }

    /* ── Sidebar ── */
    .sidebar { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; position:sticky; top:64px; height:calc(100vh - 64px); }
    .sidebar-header { padding:1.25rem 1.25rem 0.75rem; border-bottom:1px solid var(--border); }
    .sidebar-title { font-family:var(--cinzel); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); margin-bottom:10px; }
    .overall-prog { margin-bottom:4px; }
    .overall-prog-label { display:flex; justify-content:space-between; font-family:var(--cinzel); font-size:10px; letter-spacing:.06em; color:var(--text3); margin-bottom:6px; }
    .overall-prog-num { color:var(--gold); }

    /* Module items */
    .mod-item { border-bottom:1px solid var(--border); }
    .mod-item-header { display:flex; align-items:center; gap:8px; padding:10px 12px; cursor:pointer; transition:background .15s; user-select:none; }
    .mod-item-header:hover { background:var(--surface2); }
    .mod-item-header.active { background:var(--surface2); border-left:2px solid var(--gold); }
    .mod-num { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--cinzel); font-size:10px; font-weight:600; flex-shrink:0; border:1px solid; }
    .mod-num.done { background:var(--success-bg); color:var(--success); border-color:var(--success-border); }
    .mod-num.active { background:var(--gold-dim); color:var(--gold2); border-color:var(--gold-border); }
    .mod-num.locked { background:transparent; color:var(--text3); border-color:var(--border2); }
    .mod-label { flex:1; font-family:var(--cinzel); font-size:11px; letter-spacing:.04em; font-weight:600; color:var(--text2); line-height:1.3; }
    .mod-label.active { color:var(--gold); }
    .mod-label.locked { color:var(--text3); }
    .mod-chevron { font-size:10px; color:var(--text3); transition:transform .18s; flex-shrink:0; }
    .mod-chevron.open { transform:rotate(180deg); }

    /* Sub-sub-module items */
    .subsub-list { display:none; background:var(--bg); }
    .subsub-list.open { display:block; }
    .subsub-item { display:flex; align-items:center; gap:6px; padding:6px 12px 6px 60px; cursor:pointer; transition:background .15s; border-bottom:1px solid var(--border); }
    .subsub-item:last-child { border-bottom:none; }
    .subsub-item:hover { background:var(--surface2); }
    .subsub-item.active { background:var(--surface2); border-left:2px solid var(--gold-border); }
    .subsub-dash { width:10px; height:1px; background:var(--text3); flex-shrink:0; }
    .subsub-dash.active { background:var(--gold); }
    .subsub-label { font-family:var(--font); font-size:11px; color:var(--text3); flex:1; line-height:1.3; }
    .subsub-label.active { color:var(--text2); }
    .submod-list.open { display:block; }
    .submod-item { display:flex; align-items:center; gap:8px; padding:8px 12px 8px 44px; cursor:pointer; transition:background .15s; border-bottom:1px solid var(--border); }
    .submod-item:last-child { border-bottom:none; }
    .submod-item:hover { background:var(--surface2); }
    .submod-item.active { background:var(--surface2); border-left:2px solid var(--gold-border); }
    .submod-dot { width:6px; height:6px; border-radius:50%; background:var(--text3); border:1px solid var(--border2); flex-shrink:0; }
    .submod-dot.viewed { background:var(--gold); border-color:var(--gold); }
    .submod-label { font-family:var(--font); font-size:12px; color:var(--text3); flex:1; line-height:1.3; }
    .submod-label.active { color:var(--text); }
    .quiz-item { display:flex; align-items:center; gap:8px; padding:8px 12px 8px 44px; cursor:pointer; transition:background .15s; }
    .quiz-item:hover { background:var(--surface2); }
    .quiz-item.active { background:var(--surface2); }
    .quiz-dot { width:6px; height:6px; border-radius:3px; background:var(--text3); flex-shrink:0; }
    .quiz-dot.passed { background:var(--success); }
    .quiz-label { font-family:var(--cinzel); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--text3); }
    .quiz-label.passed { color:var(--success); }

    /* ── Content area ── */
    .content-area { padding:2rem 2.5rem 4rem; width:100%; }
    @media(max-width:1100px){ .content-area{padding:1.5rem 1.5rem 4rem;} }
    @media(max-width:768px){ .content-area{padding:1rem 1rem 3rem;} }

    /* Banner image - full width hero */
    .banner-img { width:100%; height:320px; object-fit:cover; border-radius:var(--radius-lg); margin-bottom:1.5rem; border:1px solid var(--border); display:block; }
    .banner-hero { width:calc(100% + 5rem); margin-left:-2.5rem; margin-top:-2rem; margin-bottom:2rem; height:360px; object-fit:cover; display:block; }
    @media(max-width:1100px){ .banner-hero{width:calc(100% + 3rem);margin-left:-1.5rem;margin-top:-1.5rem;} }
    @media(max-width:768px){ .banner-hero{width:calc(100% + 2rem);margin-left:-1rem;margin-top:-1rem;height:220px;} }

    /* Content blocks */
    .content-block { font-family:var(--serif); font-style:italic; font-size:16px; color:var(--text2); line-height:1.8; margin-bottom:1.25rem; }
    .content-img { width:100%; border-radius:var(--radius-lg); margin:1rem 0; border:1px solid var(--border); object-fit:cover; }
    .content-img-caption { font-family:var(--cinzel); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--text3); text-align:center; margin-top:-0.75rem; margin-bottom:1rem; }

    /* Video */
    .video-shell { border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border); margin-bottom:1rem; }
    .video-wrap { position:relative; padding-bottom:56.25%; background:#000; }
    .video-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
    .video-meta { padding:1rem 1.25rem; background:var(--surface); border-top:1px solid var(--border); }
    .vid-pills { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }

    /* Section labels */
    .section-bar { font-family:var(--cinzel); font-size:10px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border); }

    /* Quiz */
    .result-box { padding:1.5rem; border-radius:var(--radius-lg); text-align:center; margin-top:1rem; border:1px solid; }
    .result-pass { background:var(--success-bg); border-color:var(--success-border); }
    .result-fail { background:var(--danger-bg); border-color:var(--danger-border); }

    /* Empty state */
    .empty-module { text-align:center; padding:4rem 2rem; }
    .empty-module p { font-family:var(--serif); font-style:italic; color:var(--text3); margin-top:1rem; }

    /* Mobile toggle */
    .mobile-sidebar-btn { display:none; position:fixed; bottom:1.5rem; left:1.5rem; z-index:200; }
    @media(max-width:768px){ .mobile-sidebar-btn{display:flex;} }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div class="loading-wrap" id="loading"><div class="spinner"></div><p>Loading modules...</p></div>

  <div id="app" style="display:none;">
    <!-- Overall progress bar -->
    <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:10px 1.5rem;display:flex;align-items:center;gap:1rem;">
      <span style="font-family:var(--cinzel);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);white-space:nowrap;">Overall Progress</span>
      <div class="prog-track" style="flex:1;"><div class="prog-fill" id="overall-prog-fill" style="width:0%"></div></div>
      <span id="overall-prog-label" style="font-family:var(--cinzel);font-size:10px;letter-spacing:.06em;color:var(--gold);white-space:nowrap;">0%</span>
    </div>

    <div class="layout">
      <!-- Sidebar -->
      <div class="sidebar" id="sidebar">
        <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);">
          <div style="font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);">Modules</div>
        </div>
        <div id="sidebar-modules"></div>
      </div>

      <!-- Main content -->
      <div class="content-area" id="content-area">
        <div class="empty-module">
          <div style="font-size:2rem;">✦</div>
          <p>Select a module from the sidebar to begin.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toast-wrap"></div>

  <script type="module">
    import { requireAuth, renderNav, doLogout, db, showToast, submitQuizFn, markVideoWatched, loadModules, loadUserProgress, getModuleStatus } from "./firebase-init.js";
    import { doc, getDoc, getDocs, collection, query, orderBy, setDoc, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window._logout = doLogout;

    const urlParams = new URLSearchParams(window.location.search);
    const isPreview = urlParams.get("preview") === "1";
    const previewModuleId = urlParams.get("id");

    let currentUser = null;
    let allModules = [], progress = {};
    let currentModuleId = null, currentSubmoduleId = null, currentView = null;
    let moduleCache = {};
    let answers = {}, activeVid = 0;

    // Track which modules are expanded — all open by default
    const openModules = new Set();

    requireAuth(async (user, profile) => {
      currentUser = user;
      document.getElementById("nav-placeholder").innerHTML = renderNav(profile, profile.role === "admin");

      // In preview mode, treat all modules as unlocked
      [allModules, progress] = await Promise.all([
        loadModules(),
        isPreview ? Promise.resolve({}) : loadUserProgress(user.uid)
      ]);

      renderSidebar();
      renderOverallProgress();

      document.getElementById("loading").style.display = "none";
      document.getElementById("app").style.display = "block";

      // Show preview banner for admins in preview mode (after app is visible)
      if (isPreview && profile.role === "admin") {
        const banner = document.createElement("div");
        banner.style.cssText = "background:var(--gold-dim);border-bottom:1px solid var(--gold-border);padding:8px 1.5rem;display:flex;align-items:center;justify-content:space-between;";
        banner.innerHTML = `
          <span style="font-family:var(--cinzel);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);">
            👁 Admin preview — trainees see this page without the top banner
          </span>
          <a href="admin.html" class="btn btn-ghost btn-sm" style="font-size:10px;">← Back to admin</a>`;
        document.getElementById("app").insertAdjacentElement("afterbegin", banner);
      }

      // Open all modules in sidebar by default
      allModules.forEach(m => openModules.add(m.id));
      renderSidebar();

      // Auto-load the module from URL param (preview mode)
      if (previewModuleId) {
        const mod = allModules.find(m => m.id === previewModuleId);
        if (mod) await selectModuleIntro(previewModuleId);
      }
    });

    // ── Overall progress ──────────────────────────────────────────────────────
    function renderOverallProgress() {
      const passed = allModules.filter(m => progress[m.id]?.status === "passed").length;
      const pct = allModules.length ? Math.round((passed / allModules.length) * 100) : 0;
      document.getElementById("overall-prog-fill").style.width = pct + "%";
      document.getElementById("overall-prog-label").textContent = `${passed}/${allModules.length} modules`;
    }

    // ── Sidebar ───────────────────────────────────────────────────────────────
    function renderSidebar() {
      const container = document.getElementById("sidebar-modules");
      container.innerHTML = "";
      allModules.forEach((mod, idx) => {
        const status = isPreview ? "available" : getModuleStatus(allModules, progress, idx);
        const locked = status === "locked";
        const passed = status === "passed";
        const isOpen = openModules.has(mod.id);
        const isActive = currentModuleId === mod.id && currentView === "intro";

        const modDiv = document.createElement("div");
        modDiv.className = "mod-item";
        modDiv.id = `sidebar-mod-${mod.id}`;

        const numClass = passed ? "done" : (locked ? "locked" : "active");
        const labelClass = passed ? "" : (locked ? "locked" : (isActive ? "active" : ""));

        modDiv.innerHTML = `
          <div class="mod-item-header ${isActive?"active":""}" id="modheader-${mod.id}">
            <div class="mod-num ${numClass}">${passed?"✓":idx+1}</div>
            <div class="mod-label ${labelClass}"
              style="cursor:${locked?"default":"pointer"};"
              onclick="${locked ? "" : `selectModuleIntro('${mod.id}')`}"
            >${mod.title||"Module "+(idx+1)}</div>
            ${!locked ? `
              <div class="mod-chevron ${isOpen?"open":""}" id="modchev-${mod.id}"
                onclick="toggleModuleOpen('${mod.id}')"
                style="cursor:pointer;padding:4px 6px;margin:-4px -6px;">▾</div>
            ` : ""}
          </div>
          <div class="submod-list ${isOpen?"open":""}" id="submodlist-${mod.id}">
            ${isOpen ? `<div class="loading-wrap" style="min-height:60px;padding:1rem;" id="submod-loading-${mod.id}">
              <div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>
            </div>` : ""}
          </div>`;
        container.appendChild(modDiv);

        if (isOpen) loadSubmoduleSidebar(mod.id);
      });
    }

    async function loadSubmoduleSidebar(moduleId) {
      if (!moduleCache[moduleId]) await fetchModuleData(moduleId);
      const cached = moduleCache[moduleId];
      const loadingEl = document.getElementById(`submod-loading-${moduleId}`);
      if (loadingEl) loadingEl.remove();

      const list = document.getElementById(`submodlist-${moduleId}`);
      if (!list) return;
      list.innerHTML = "";

      const submodules = cached.submodules || [];
      const viewedSubs = progress[moduleId]?.viewedSubmodules || [];

      if (submodules.length === 0 && (cached.videos||[]).length === 0) {
        list.innerHTML = `<div style="padding:8px 12px 8px 44px;font-size:12px;color:var(--text3);font-family:var(--serif);font-style:italic;">Content coming soon</div>`;
      }

      // If no submodules but has videos, show direct video link
      if (submodules.length === 0 && (cached.videos||[]).length > 0) {
        const item = document.createElement("div");
        item.className = `submod-item ${currentSubmoduleId==="videos"?"active":""}`;
        item.onclick = () => showVideos(moduleId);
        item.innerHTML = `<div class="submod-dot ${viewedSubs.includes("videos")?"viewed":""}"></div><div class="submod-label ${currentSubmoduleId==="videos"?"active":""}">Videos (${cached.videos.length})</div>`;
        list.appendChild(item);
      }

      submodules.forEach(sub => {
        const isActiveSub = currentSubmoduleId===sub.id && currentView!=="subsection";
        const item = document.createElement("div");
        item.className = `submod-item ${isActiveSub?"active":""}`;
        item.onclick = () => showSubmodule(moduleId, sub.id);
        item.innerHTML = `
          <div class="submod-dot ${viewedSubs.includes(sub.id)?"viewed":""}"></div>
          <div class="submod-label ${isActiveSub?"active":""}">
            ${sub.order ? sub.order+"  " : ""}${sub.title||"Untitled"}
          </div>
          ${(sub.subsections||[]).length > 0 ? `<span style="font-size:10px;color:var(--text3);">▾</span>` : ""}`;
        list.appendChild(item);

        // Sub-sub-modules (subsections) nested underneath
        if ((sub.subsections||[]).length > 0) {
          sub.subsections.forEach(ss => {
            const isActiveSS = currentSubmoduleId===sub.id && currentView==="subsection" && window._activeSubsectionId===ss.id;
            const ssItem = document.createElement("div");
            ssItem.className = `subsub-item ${isActiveSS?"active":""}`;
            ssItem.onclick = (e) => { e.stopPropagation(); showSubsection(moduleId, sub.id, ss.id); };
            ssItem.innerHTML = `
              <div class="subsub-dash ${isActiveSS?"active":""}"></div>
              <div class="subsub-label ${isActiveSS?"active":""}">
                ${ss.order ? ss.order+"  " : ""}${ss.title||"Untitled"}
              </div>`;
            list.appendChild(ssItem);
          });
        }
      });

      // Quiz item
      const quizPassed = progress[moduleId]?.status === "passed";
      const hasQuestions = (cached.questions||[]).length > 0;
      if (hasQuestions) {
        const quizItem = document.createElement("div");
        quizItem.className = `quiz-item ${currentView==="quiz"&&currentModuleId===moduleId?"active":""}`;
        quizItem.onclick = () => showQuiz(moduleId);
        quizItem.innerHTML = `
          <div class="quiz-dot ${quizPassed?"passed":""}"></div>
          <div class="quiz-label ${quizPassed?"passed":""}">
            ${quizPassed?"✓ Quiz Passed":"Module Quiz"}
          </div>`;
        list.appendChild(quizItem);
      }
    }

    // Click the title → load base page (doesn't affect open/close state)
    window.selectModuleIntro = async function(moduleId) {
      currentModuleId = moduleId;
      currentSubmoduleId = null;
      currentView = "intro";
      // Also open it in sidebar if not already
      if (!openModules.has(moduleId)) {
        openModules.add(moduleId);
      }
      renderSidebar();
      await loadSubmoduleSidebar(moduleId);
      await showModuleIntro(moduleId);
    };

    // Click the arrow → toggle open/closed without changing the content area
    window.toggleModuleOpen = async function(moduleId) {
      if (openModules.has(moduleId)) {
        openModules.delete(moduleId);
        // Update just the chevron and list without full re-render
        const chev = document.getElementById(`modchev-${moduleId}`);
        const list = document.getElementById(`submodlist-${moduleId}`);
        if (chev) chev.classList.remove("open");
        if (list) list.classList.remove("open");
      } else {
        openModules.add(moduleId);
        const chev = document.getElementById(`modchev-${moduleId}`);
        const list = document.getElementById(`submodlist-${moduleId}`);
        if (chev) chev.classList.add("open");
        if (list) {
          list.classList.add("open");
          // Show spinner while loading
          list.innerHTML = `<div class="loading-wrap" style="min-height:60px;padding:1rem;" id="submod-loading-${moduleId}">
            <div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>
          </div>`;
          await loadSubmoduleSidebar(moduleId);
        }
      }
    };

    // Keep old toggleModule as alias for preview auto-open
    window.toggleModule = async function(moduleId, locked) {
      if (locked) { showToast("Complete the previous module first.", "info"); return; }
      await selectModuleIntro(moduleId);
    };

    // ── Fetch module data ─────────────────────────────────────────────────────
    async function fetchModuleData(moduleId) {
      const [subSnap, vidSnap, queSnap] = await Promise.all([
        getDocs(query(collection(db,"modules",moduleId,"submodules"),orderBy("order"))).catch(()=>({docs:[]})),
        getDocs(query(collection(db,"modules",moduleId,"videos"),orderBy("order"))).catch(()=>({docs:[]})),
        getDocs(query(collection(db,"modules",moduleId,"questions"),orderBy("order"))).catch(()=>({docs:[]})),
      ]);

      const submodules = await Promise.all(subSnap.docs.map(async d => {
        const sub = {id:d.id,...d.data()};
        const [subVidSnap, subImgSnap, subSubSnap] = await Promise.all([
          getDocs(query(collection(db,"modules",moduleId,"submodules",d.id,"videos"),orderBy("order"))).catch(()=>({docs:[]})),
          getDocs(query(collection(db,"modules",moduleId,"submodules",d.id,"images"),orderBy("order"))).catch(()=>({docs:[]})),
          getDocs(query(collection(db,"modules",moduleId,"submodules",d.id,"subsections"),orderBy("order"))).catch(()=>({docs:[]})),
        ]);
        sub.videos = subVidSnap.docs.map(v=>({id:v.id,...v.data()}));
        sub.images = subImgSnap.docs.map(i=>({id:i.id,...i.data()}));
        // Load each sub-sub-module's videos and images
        sub.subsections = await Promise.all(subSubSnap.docs.map(async ss => {
          const ssData = {id:ss.id,...ss.data()};
          const [ssVids, ssImgs] = await Promise.all([
            getDocs(query(collection(db,"modules",moduleId,"submodules",d.id,"subsections",ss.id,"videos"),orderBy("order"))).catch(()=>({docs:[]})),
            getDocs(query(collection(db,"modules",moduleId,"submodules",d.id,"subsections",ss.id,"images"),orderBy("order"))).catch(()=>({docs:[]})),
          ]);
          ssData.videos = ssVids.docs.map(v=>({id:v.id,...v.data()}));
          ssData.images = ssImgs.docs.map(i=>({id:i.id,...i.data()}));
          return ssData;
        }));
        return sub;
      }));

      moduleCache[moduleId] = {
        submodules,
        videos: vidSnap.docs.map(d=>({id:d.id,...d.data()})),
        questions: queSnap.docs.map(d=>({id:d.id,...d.data()})),
      };
    }

    // ── Content rendering ─────────────────────────────────────────────────────
    async function showModuleIntro(moduleId) {
      if (!moduleCache[moduleId]) await fetchModuleData(moduleId);
      const mod = allModules.find(m=>m.id===moduleId);
      const cached = moduleCache[moduleId];
      currentView = "intro";

      let html = "";

      // Big hero image - bleeds to edges
      if (mod.bannerImage) {
        html += `<img src="${mod.bannerImage}" class="banner-hero" alt="${mod.title||""}"/>`;
      }

      // Preview button for admins
      if (isPreview) {
        html += `<div style="margin-bottom:1rem;"><a href="admin.html" class="btn btn-ghost btn-sm">← Back to admin</a></div>`;
      }

      html += `<p style="font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-style:normal;">Module ${allModules.indexOf(mod)+1}</p>`;
      html += `<h1 class="gold-text" style="margin-bottom:1rem;">${mod.title||""}</h1>`;
      if (mod.description) html += `<p style="margin-bottom:1.5rem;">${mod.description}</p>`;

      if (mod.content) {
        const blocks = mod.content.split("\n\n").filter(b=>b.trim());
        blocks.forEach(b => { html += renderContentBlock(b); });
      }

      html += `<div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>`;

      if (cached.submodules.length > 0) {
        html += `<p style="font-family:var(--cinzel);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;font-style:normal;">In this module</p>`;
        html += `<div style="display:flex;flex-direction:column;gap:8px;">`;
        cached.submodules.forEach(sub => {
          html += `<div onclick="showSubmodule('${moduleId}','${sub.id}')" style="padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:12px;" onmouseover="this.style.borderColor='var(--gold-border)'" onmouseout="this.style.borderColor='var(--border)'">
            <div style="font-family:var(--cinzel);font-size:11px;color:var(--gold);font-weight:600;">${sub.order||""}</div>
            <div>
              <div style="font-family:var(--cinzel);font-size:13px;font-weight:600;color:var(--text);">${sub.title||""}</div>
              ${sub.description?`<div style="font-size:12px;color:var(--text3);font-family:var(--font);">${sub.description}</div>`:""}
            </div>
            <div style="margin-left:auto;color:var(--text3);">→</div>
          </div>`;
        });
        html += `</div>`;
      } else if (cached.videos.length > 0) {
        html += renderVideosSection(cached.videos, moduleId, null);
      }

      if (cached.questions.length > 0) {
        html += `<div class="ornament" style="margin-top:2rem;"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>`;
        html += renderQuizCTA(moduleId);
      }

      document.getElementById("content-area").innerHTML = html;
    }

    async function showSubmodule(moduleId, submoduleId) {
      if (!moduleCache[moduleId]) await fetchModuleData(moduleId);
      const cached = moduleCache[moduleId];
      const sub = cached.submodules.find(s=>s.id===submoduleId);
      if (!sub) return;

      currentModuleId = moduleId;
      currentSubmoduleId = submoduleId;
      currentView = "submodule";

      // Make sure this module is open in sidebar
      openModules.add(moduleId);

      // Mark as viewed
      const viewedSubs = progress[moduleId]?.viewedSubmodules || [];
      if (!viewedSubs.includes(submoduleId)) {
        viewedSubs.push(submoduleId);
        if (!progress[moduleId]) progress[moduleId] = {};
        progress[moduleId].viewedSubmodules = viewedSubs;
        await setDoc(doc(db,"users",currentUser.uid,"progress",moduleId),
          {viewedSubmodules: arrayUnion(submoduleId), startedAt: serverTimestamp()},
          {merge:true});
      }

      renderSidebar();
      await loadSubmoduleSidebar(moduleId);

      let html = "";
      if (sub.bannerImage) html += `<img src="${sub.bannerImage}" class="banner-hero" alt="${sub.title||""}"/>`;

      // Preview back button for admins
      if (isPreview) {
        html += `<div style="margin-bottom:1rem;"><a href="admin.html" class="btn btn-ghost btn-sm">← Back to admin</a></div>`;
      }

      html += `<p style="font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-style:normal;">${sub.order||""}</p>`;
      html += `<h1 class="gold-text" style="margin-bottom:1rem;">${sub.title||""}</h1>`;
      if (sub.description) html += `<p style="margin-bottom:1.5rem;">${sub.description}</p>`;

      if (sub.content) {
        const blocks = sub.content.split("\n\n").filter(b=>b.trim());
        blocks.forEach(b => { html += renderContentBlock(b); });
      }

      // Images
      if (sub.images && sub.images.length > 0) {
        sub.images.forEach(img => {
          html += `<img src="${img.url}" class="content-img" alt="${img.caption||""}"/>`;
          if (img.caption) html += `<p class="content-img-caption">${img.caption}</p>`;
        });
      }

      // Videos
      if (sub.videos && sub.videos.length > 0) {
        html += `<div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>`;
        html += renderVideosSection(sub.videos, moduleId, submoduleId);
      }

      // Navigation between submodules
      const subIdx = cached.submodules.indexOf(sub);
      const prevSub = cached.submodules[subIdx-1];
      const nextSub = cached.submodules[subIdx+1];
      html += `<div class="ornament" style="margin-top:2rem;"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>`;
      html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem;">`;
      html += prevSub
        ? `<button class="btn btn-ghost" onclick="showSubmodule('${moduleId}','${prevSub.id}')">← ${prevSub.title}</button>`
        : `<button class="btn btn-ghost" onclick="showModuleIntro('${moduleId}')">← Module Overview</button>`;
      if (nextSub) {
        html += `<button class="btn btn-primary" onclick="showSubmodule('${moduleId}','${nextSub.id}')">${nextSub.title} →</button>`;
      } else if (cached.questions.length > 0) {
        html += `<button class="btn btn-primary" onclick="showQuiz('${moduleId}')">Take Quiz →</button>`;
      }
      html += `</div>`;

      document.getElementById("content-area").innerHTML = html;
      setupVideoPlayers();
    }

    // ── Show sub-sub-module (subsection) ──────────────────────────────────────
    window.showSubsection = async function(moduleId, submoduleId, subsectionId) {
      if (!moduleCache[moduleId]) await fetchModuleData(moduleId);
      const cached = moduleCache[moduleId];
      const sub = cached.submodules.find(s=>s.id===submoduleId);
      const ss = sub?.subsections?.find(s=>s.id===subsectionId);
      if (!ss) return;

      currentModuleId = moduleId;
      currentSubmoduleId = submoduleId;
      currentView = "subsection";
      window._activeSubsectionId = subsectionId;

      renderSidebar();
      await loadSubmoduleSidebar(moduleId);

      let html = "";
      if (ss.bannerImage) html += `<img src="${ss.bannerImage}" class="banner-hero" alt="${ss.title||""}"/>`;

      if (isPreview) html += `<div style="margin-bottom:1rem;"><a href="admin.html" class="btn btn-ghost btn-sm">← Back to admin</a></div>`;

      html += `<p style="font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-style:normal;">${ss.order||""}</p>`;
      html += `<h1 class="gold-text" style="margin-bottom:1rem;">${ss.title||""}</h1>`;
      if (ss.description) html += `<p style="margin-bottom:1.5rem;">${ss.description}</p>`;

      if (ss.content) {
        ss.content.split("\n\n").filter(b=>b.trim()).forEach(b => { html += renderContentBlock(b); });
      }

      if (ss.images && ss.images.length > 0) {
        ss.images.forEach(img => {
          html += `<img src="${img.url}" class="content-img" alt="${img.caption||""}"/>`;
          if (img.caption) html += `<p class="content-img-caption">${img.caption}</p>`;
        });
      }

      if (ss.videos && ss.videos.length > 0) {
        html += `<div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>`;
        html += renderVideosSection(ss.videos, moduleId, subsectionId);
      }

      // Prev/next nav within subsections
      const ssIdx = sub.subsections.indexOf(ss);
      const prevSS = sub.subsections[ssIdx-1];
      const nextSS = sub.subsections[ssIdx+1];
      html += `<div class="ornament" style="margin-top:2rem;"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>`;
      html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem;">`;
      html += prevSS
        ? `<button class="btn btn-ghost" onclick="showSubsection('${moduleId}','${submoduleId}','${prevSS.id}')">← ${prevSS.title}</button>`
        : `<button class="btn btn-ghost" onclick="showSubmodule('${moduleId}','${submoduleId}')">← ${sub.title}</button>`;
      if (nextSS) {
        html += `<button class="btn btn-primary" onclick="showSubsection('${moduleId}','${submoduleId}','${nextSS.id}')">${nextSS.title} →</button>`;
      }
      html += `</div>`;

      document.getElementById("content-area").innerHTML = html;
      setupVideoPlayers();
    };
      if (!moduleCache[moduleId]) await fetchModuleData(moduleId);
      const cached = moduleCache[moduleId];
      currentSubmoduleId = "videos";
      currentView = "videos";
      renderSidebar();
      await loadSubmoduleSidebar(moduleId);
      let html = `<h2 class="gold-text" style="margin-bottom:1.5rem;">Videos</h2>`;
      html += renderVideosSection(cached.videos, moduleId, null);
      document.getElementById("content-area").innerHTML = html;
      setupVideoPlayers();
    };

    function renderContentBlock(text) {
      // Check if it's an image markdown: ![caption](url)
      const imgMatch = text.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
      if (imgMatch) {
        let h = `<img src="${imgMatch[2]}" class="content-img" alt="${imgMatch[1]}"/>`;
        if (imgMatch[1]) h += `<p class="content-img-caption">${imgMatch[1]}</p>`;
        return h;
      }
      return `<p class="content-block">${text}</p>`;
    }

    function renderVideosSection(videos, moduleId, submoduleId) {
      if (!videos || videos.length === 0) return "";
      const first = videos[0];
      let html = `<div class="section-bar">Training Videos</div>`;
      html += `<div class="video-shell" id="video-shell-${moduleId}">
        <div class="video-wrap">
          <iframe id="yt-iframe-${moduleId}" src="https://www.youtube.com/embed/${first.youtubeId}?rel=0" allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
        </div>
        <div class="video-meta">
          <div id="vid-title-${moduleId}" style="font-family:var(--cinzel);font-size:13px;font-weight:600;letter-spacing:.04em;">${first.title||""}</div>
          <div id="vid-counter-${moduleId}" style="font-size:12px;color:var(--text3);font-family:var(--font);margin-top:4px;">Video 1 of ${videos.length}</div>
          <div class="vid-pills" id="vid-pills-${moduleId}"></div>
        </div>
      </div>`;
      return html;
    }

    function setupVideoPlayers() {
      if (!currentModuleId) return;
      const cached = moduleCache[currentModuleId];
      if (!cached) return;

      let videos = [];
      if (currentSubmoduleId && currentSubmoduleId !== "videos") {
        const sub = cached.submodules.find(s=>s.id===currentSubmoduleId);
        videos = sub?.videos || [];
      } else {
        videos = cached.videos || [];
      }

      if (videos.length === 0) return;
      let activeIdx = 0;
      const watchedVideos = progress[currentModuleId]?.videosWatched || [];

      function loadVideo(idx) {
        activeIdx = idx;
        const v = videos[idx];
        const iframe = document.getElementById(`yt-iframe-${currentModuleId}`);
        const title = document.getElementById(`vid-title-${currentModuleId}`);
        const counter = document.getElementById(`vid-counter-${currentModuleId}`);
        if (!iframe) return;
        iframe.src = `https://www.youtube.com/embed/${v.youtubeId}?rel=0`;
        if (title) title.textContent = v.title || "";
        if (counter) counter.textContent = `Video ${idx+1} of ${videos.length}`;
        renderPills();
        setTimeout(() => {
          if (!watchedVideos.includes(v.id)) {
            watchedVideos.push(v.id);
            markVideoWatched(currentUser.uid, currentModuleId, v.id);
          }
        }, 2500);
      }

      function renderPills() {
        const pillsEl = document.getElementById(`vid-pills-${currentModuleId}`);
        if (!pillsEl) return;
        pillsEl.innerHTML = "";
        videos.forEach((v,i) => {
          const watched = watchedVideos.includes(v.id);
          const btn = document.createElement("button");
          btn.className = `vid-pill ${i===activeIdx?"current":watched?"watched":""}`;
          btn.textContent = (watched&&i!==activeIdx?"✓ ":"")+v.title;
          btn.onclick = () => loadVideo(i);
          pillsEl.appendChild(btn);
        });
      }

      loadVideo(0);
    }

    // ── Quiz ──────────────────────────────────────────────────────────────────
    window.showQuiz = async function(moduleId) {
      if (!moduleCache[moduleId]) await fetchModuleData(moduleId);
      const cached = moduleCache[moduleId];
      const mod = allModules.find(m=>m.id===moduleId);
      currentModuleId = moduleId;
      currentView = "quiz";
      answers = {};
      renderSidebar();
      await loadSubmoduleSidebar(moduleId);

      const quizPassed = progress[moduleId]?.status === "passed";
      let html = `<h1 class="gold-text" style="margin-bottom:0.5rem;">Module Quiz</h1>`;
      html += `<p style="margin-bottom:1.5rem;">Score ${mod?.passingScore||4}/${mod?.totalQuestions||cached.questions.length} or higher to pass.</p>`;

      if (quizPassed) {
        html += `<div class="result-box result-pass" style="margin-bottom:1.5rem;">
          <div style="font-size:1.5rem;margin-bottom:8px;">✦</div>
          <h2 style="font-family:var(--display);letter-spacing:.06em;color:var(--success);">Already Passed</h2>
          <p style="color:var(--success);font-style:normal;font-family:var(--cinzel);font-size:11px;letter-spacing:.1em;margin-top:6px;">${progress[moduleId].quizScore}/${progress[moduleId].totalQuestions||cached.questions.length} correct</p>
        </div>`;
      }

      html += `<div id="quiz-questions">`;
      cached.questions.forEach((q,qi) => {
        html += `<div style="margin-bottom:1.5rem;">
          <p style="font-size:15px;font-weight:500;margin-bottom:12px;color:var(--text);font-family:var(--font);font-style:normal;line-height:1.5;">${qi+1}. ${q.question}</p>`;
        (q.options||[]).forEach((opt,oi) => {
          html += `<button class="answer-btn" id="ans-${qi}-${oi}" onclick="selectAnswer(${qi},${oi},${cached.questions.length})">
            <span class="answer-letter">${String.fromCharCode(65+oi)}</span>${opt}
          </button>`;
        });
        if (qi < cached.questions.length-1) html += `<hr class="divider" style="margin-top:1rem;"/>`;
        html += `</div>`;
      });
      html += `</div>`;
      html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem;">
        <span id="quiz-answered" style="font-family:var(--cinzel);font-size:10px;letter-spacing:.08em;color:var(--text3);">0 / ${cached.questions.length} answered</span>
        <button class="btn btn-primary btn-lg" id="quiz-submit-btn" onclick="submitQuizNow('${moduleId}')" disabled>Submit Quiz</button>
      </div>`;
      html += `<div id="quiz-result" style="display:none;"></div>`;

      document.getElementById("content-area").innerHTML = html;
    };

    window.selectAnswer = function(qi, oi, total) {
      answers[qi] = oi;
      // Update button styles
      for (let i=0;i<4;i++) {
        const btn = document.getElementById(`ans-${qi}-${i}`);
        if (btn) btn.classList.toggle("selected", i===oi);
      }
      const answered = Object.keys(answers).length;
      const counter = document.getElementById("quiz-answered");
      const submitBtn = document.getElementById("quiz-submit-btn");
      if (counter) counter.textContent = `${answered} / ${total} answered`;
      if (submitBtn) submitBtn.disabled = answered < total;
    };

    window.submitQuizNow = async function(moduleId) {
      const cached = moduleCache[moduleId];
      const btn = document.getElementById("quiz-submit-btn");
      btn.textContent = "Submitting..."; btn.disabled = true;
      try {
        const answerArray = cached.questions.map((q,i) => answers[i] ?? -1);
        const res = await submitQuizFn({moduleId, answers: answerArray});
        const {score, totalQuestions, passed, attempts} = res.data;
        if (!progress[moduleId]) progress[moduleId] = {};
        progress[moduleId] = {...progress[moduleId], status: passed?"passed":"failed", quizScore:score, totalQuestions, attempts};
        renderOverallProgress();
        renderSidebar();
        await loadSubmoduleSidebar(moduleId);
        const resultEl = document.getElementById("quiz-result");
        resultEl.style.display = "block";
        if (passed) {
          resultEl.className = "result-box result-pass";
          resultEl.innerHTML = `<div style="font-size:1.5rem;margin-bottom:8px;">✦</div><h2 style="font-family:var(--display);font-size:2rem;letter-spacing:.06em;color:var(--success);">Passed!</h2><p style="color:var(--success);font-style:normal;font-family:var(--cinzel);font-size:11px;letter-spacing:.1em;margin-top:6px;">${score} / ${totalQuestions} correct</p><a href="dashboard.html" class="btn btn-success" style="margin-top:1rem;">Back to Dashboard</a>`;
          showToast(`Passed! ${score}/${totalQuestions}`, "success");
        } else {
          resultEl.className = "result-box result-fail";
          resultEl.innerHTML = `<h2 style="font-family:var(--display);font-size:2rem;letter-spacing:.06em;color:var(--danger);">Not Quite</h2><p style="color:var(--danger);font-style:normal;font-family:var(--cinzel);font-size:11px;letter-spacing:.1em;margin-top:6px;">${score} / ${totalQuestions} — try again</p><button class="btn btn-primary" style="margin-top:1rem;" onclick="showQuiz('${moduleId}')">Retake Quiz</button>`;
          showToast(`${score}/${totalQuestions} — try again`, "error");
        }
      } catch(e) {
        showToast("Submission failed. Cloud Functions may not be deployed.", "error");
      } finally {
        btn.textContent="Submit Quiz"; btn.disabled=false;
      }
    };

    // expose to window
    window.showModuleIntro = showModuleIntro;
    window.showSubmodule = showSubmodule;
  </script>
</body>
</html>
