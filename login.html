<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Belladonna Training — Sign in</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg);}
    .login-box{width:100%;max-width:400px;}
    .form-group{margin-bottom:1rem;}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box fade-up">
      <div class="login-brand">
        <img src="logo.png" class="login-logo" onerror="this.style.display='none'" alt="Belladonna"/>
        <div class="login-title">BELLADONNA</div>
        <div class="login-sub">Host Training Portal</div>
      </div>

      <div class="card" style="margin-top:1.5rem;">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@belladonna.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <div id="error-msg" style="display:none;" class="error-msg mt-1"></div>
        <button class="btn btn-primary btn-lg btn-full mt-2" id="login-btn" onclick="handleLogin()">
          Sign In
        </button>
      </div>

      <p style="text-align:center;margin-top:1.5rem;font-family:var(--cinzel);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);">
        Contact your manager if you need access.
      </p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-init.js";
    import { onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Already logged in? Redirect to correct page
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        const profile = snap.exists() ? snap.data() : {};
        window.location.href = profile.role === "admin" ? "admin.html" : "dashboard.html";
      }
    });

    window.handleLogin = async function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("login-btn");
      const err = document.getElementById("error-msg");

      if (!email || !password) {
        err.textContent = "Please enter your email and password.";
        err.style.display = "block";
        return;
      }

      btn.textContent = "Signing in…";
      btn.disabled = true;
      err.style.display = "none";

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const snap = await getDoc(doc(db, "users", cred.user.uid));
        const profile = snap.exists() ? snap.data() : {};
        window.location.href = profile.role === "admin" ? "admin.html" : "dashboard.html";
      } catch (e) {
        err.textContent = "Invalid email or password.";
        err.style.display = "block";
        btn.textContent = "Sign In";
        btn.disabled = false;
      }
    };

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") window.handleLogin();
    });
  </script>
</body>
</html>
