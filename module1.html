<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Belladonna Training — Brand & Ethics</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .video-wrap { position:relative; padding-bottom:56.25%; background:#000; border-radius:var(--radius-lg) var(--radius-lg) 0 0; overflow:hidden; }
    .video-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
    .video-shell { border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border); margin-bottom:1rem; }
    .video-meta { padding:1rem 1.25rem; background:var(--surface); border-top:1px solid var(--border); }
    .content-block { font-family:var(--serif); font-style:italic; font-size:16px; color:var(--text2); line-height:1.8; margin-bottom:1.25rem; padding:1.25rem 1.5rem; background:var(--surface); border:1px solid var(--border); border-left:2px solid var(--gold-border); border-radius:var(--radius-lg); }
    .result-box { padding:1.5rem; border-radius:var(--radius-lg); text-align:center; margin-top:1rem; border:1px solid; }
    .result-pass { background:var(--success-bg); border-color:var(--success-border); }
    .result-fail { background:var(--danger-bg); border-color:var(--danger-border); }
    .section-title-bar { font-family:var(--cinzel); font-size:10px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div class="loading-wrap" id="loading"><div class="spinner"></div><p>Loading module...</p></div>

  <main id="main" style="display:none;">
    <div class="page-wrap">

      <div style="margin-bottom:1.5rem;font-size:13px;color:var(--text3);font-family:var(--cinzel);letter-spacing:.06em;">
        <a href="dashboard.html" style="color:var(--gold);text-decoration:none;">Dashboard</a>
        <span style="margin:0 8px;">›</span>
        <span>Brand &amp; Ethics</span>
      </div>

      <div style="margin-bottom:1.5rem;" class="flex justify-between items-center">
        <div>
          <p style="font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-style:normal;">Module 1</p>
          <h1 class="gold-text">Brand &amp; Ethics</h1>
          <p style="margin-top:6px;">Identity, dress code, interaction ethics</p>
        </div>
        <div id="passed-badge" style="display:none;">
          <span class="badge badge-pass" id="score-badge">✓ Passed</span>
        </div>
      </div>

      <div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>

      <div id="video-section">
        <!-- Content blocks -->
        <div id="content-area" style="margin-bottom:1.5rem;"></div>

        <!-- Video player -->
        <div id="video-player-wrap" style="display:none;">
          <div class="section-title-bar">Training videos</div>
          <div class="video-shell">
            <div class="video-wrap">
              <iframe id="yt-iframe" src="" allowfullscreen
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
              </iframe>
            </div>
            <div class="video-meta">
              <div id="vid-title" style="font-family:var(--cinzel);font-size:13px;letter-spacing:.06em;font-weight:600;margin-bottom:6px;"></div>
              <div id="vid-counter" class="text-muted" style="margin-bottom:10px;font-family:var(--font);"></div>
              <div id="vid-pills" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
            </div>
          </div>
        </div>

        <!-- Quiz CTA -->
        <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-top:1rem;">
          <div>
            <div style="font-family:var(--cinzel);font-size:13px;font-weight:600;letter-spacing:.06em;margin-bottom:4px;">Module Quiz</div>
            <div id="quiz-cta-sub" class="text-muted"></div>
          </div>
          <div id="quiz-cta-btn"></div>
        </div>
      </div>

      <!-- Quiz section -->
      <div id="quiz-section" style="display:none;" class="fade-in">
        <div class="card" style="margin-bottom:1rem;">
          <div class="flex justify-between items-center" style="margin-bottom:1.5rem;">
            <h2 style="font-family:var(--cinzel);font-size:16px;letter-spacing:.08em;">Module Quiz</h2>
            <span id="q-counter" class="text-muted"></span>
          </div>
          <div id="questions-wrap"></div>
        </div>
        <div class="flex justify-between items-center">
          <button class="btn btn-ghost" onclick="showVideos()">← Back</button>
          <button class="btn btn-primary btn-lg" id="submit-btn" onclick="submitQuiz()" disabled>Submit Quiz</button>
        </div>
        <div id="result-box" style="display:none;"></div>
      </div>

      <div class="ornament" style="margin-top:2rem;"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>

      <div class="flex justify-between items-center" style="margin-top:1rem;">
        <span></span>
        <a href="dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
        <a href="module2.html" class="btn btn-ghost btn-sm">Module 2 →</a>
      </div>
    </div>
  </main>

  <div class="toast-wrap" id="toast-wrap"></div>

  <script type="module">
    import { requireAuth, renderNav, doLogout, db, showToast, submitQuizFn, markVideoWatched } from "./firebase-init.js";
    import { doc, getDoc, getDocs, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window._logout = doLogout;

    const MODULE_ID = "module_1";
    let videos = [], questions = [], watchedVideos = [], activeVid = 0;
    let answers = {}, currentUser = null, moduleData = null, progressData = null;

    requireAuth(async (user, profile) => {
      currentUser = user;
      document.getElementById("nav-placeholder").innerHTML = renderNav(profile, profile.role === "admin");

      try {
        // Load all data — questions may not exist yet, that's ok
        const [modSnap, vidSnap, queSnap, progSnap] = await Promise.all([
          getDoc(doc(db, "modules", MODULE_ID)),
          getDocs(query(collection(db, "modules", MODULE_ID, "videos"), orderBy("order"))).catch(()=>{return {docs:[]}}),
          getDocs(query(collection(db, "modules", MODULE_ID, "questions"), orderBy("order"))).catch(()=>{return {docs:[]}}),
          getDoc(doc(db, "users", user.uid, "progress", MODULE_ID)).catch(()=>null),
        ]);

        if (modSnap.exists()) {
          moduleData = { id: modSnap.id, ...modSnap.data() };
        } else {
          moduleData = { id: MODULE_ID, title: "Brand & Ethics", description: "Identity, dress code, interaction ethics", content: "", passingScore: 4, totalQuestions: 5 };
        }

        videos = vidSnap.docs ? vidSnap.docs.map(d => ({ id: d.id, ...d.data() })) : [];
        questions = queSnap.docs ? queSnap.docs.map(d => ({ id: d.id, ...d.data() })) : [];

        if (progSnap && progSnap.exists && progSnap.exists()) {
          progressData = progSnap.data();
          watchedVideos = progressData.videosWatched || [];
          if (progressData.status === "passed") {
            document.getElementById("passed-badge").style.display = "block";
            document.getElementById("score-badge").textContent = `✓ Passed ${progressData.quizScore}/${moduleData.totalQuestions || questions.length}`;
          }
        }

        renderContent();
        if (videos.length > 0) {
          document.getElementById("video-player-wrap").style.display = "block";
          renderVideo(0);
        }
        renderQuizCTA();

      } catch(e) {
        console.error("Module load error:", e);
        showToast("Error loading module. Please refresh.", "error");
      }

      document.getElementById("loading").style.display = "none";
      document.getElementById("main").style.display = "block";
    });

    function renderContent() {
      const area = document.getElementById("content-area");
      const content = moduleData?.content || "";
      if (!content.trim()) {
        area.innerHTML = "";
        return;
      }
      const blocks = content.split("\n\n").filter(b => b.trim());
      area.innerHTML = blocks.map(b => `<div class="content-block">${b.trim()}</div>`).join("");
    }

    function renderVideo(idx) {
      activeVid = idx;
      const v = videos[idx];
      if (!v) return;
      document.getElementById("yt-iframe").src = `https://www.youtube.com/embed/${v.youtubeId}?rel=0`;
      document.getElementById("vid-title").textContent = v.title || "";
      document.getElementById("vid-counter").textContent = `Video ${idx + 1} of ${videos.length}`;
      setTimeout(() => {
        if (!watchedVideos.includes(v.id)) {
          watchedVideos.push(v.id);
          markVideoWatched(currentUser.uid, MODULE_ID, v.id);
          renderPills();
          renderQuizCTA();
        }
      }, 2500);
      renderPills();
    }

    function renderPills() {
      const wrap = document.getElementById("vid-pills");
      wrap.innerHTML = "";
      videos.forEach((v, i) => {
        const watched = watchedVideos.includes(v.id);
        const current = i === activeVid;
        const btn = document.createElement("button");
        btn.className = `vid-pill ${current ? "current" : watched ? "watched" : ""}`;
        btn.textContent = (watched && !current ? "✓ " : "") + v.title;
        btn.onclick = () => renderVideo(i);
        wrap.appendChild(btn);
      });
    }

    function renderQuizCTA() {
      const allWatched = videos.length === 0 || videos.every(v => watchedVideos.includes(v.id));
      const passed = progressData?.status === "passed";
      const sub = document.getElementById("quiz-cta-sub");
      const btnWrap = document.getElementById("quiz-cta-btn");

      if (questions.length === 0) {
        sub.textContent = "Quiz questions coming soon.";
        btnWrap.innerHTML = `<button class="btn btn-ghost btn-sm" disabled>Quiz not yet available</button>`;
        return;
      }
      if (passed) {
        sub.textContent = `Quiz complete — ${progressData.quizScore}/${moduleData?.totalQuestions || questions.length} correct.`;
        btnWrap.innerHTML = `<a href="dashboard.html" class="btn btn-success">Continue →</a>`;
      } else if (allWatched) {
        const attempts = progressData?.attempts || 0;
        sub.textContent = `Score ${moduleData?.passingScore || 4}/${moduleData?.totalQuestions || questions.length} or higher to unlock the next module.`;
        btnWrap.innerHTML = `<button class="btn btn-primary" onclick="showQuiz()">${attempts > 0 ? `Retake Quiz (Attempt ${attempts + 1})` : "Take Quiz"}</button>`;
      } else {
        sub.textContent = videos.length > 0 ? "Watch all videos first." : "No videos yet — check back soon.";
        btnWrap.innerHTML = `<button class="btn btn-primary" disabled>Take Quiz</button>`;
      }
    }

    window.showQuiz = function() {
      if (questions.length === 0) { showToast("No questions available yet.", "info"); return; }
      answers = {};
      renderQuestions();
      document.getElementById("video-section").style.display = "none";
      document.getElementById("quiz-section").style.display = "block";
      document.getElementById("result-box").style.display = "none";
      updateSubmitBtn();
    };

    window.showVideos = function() {
      document.getElementById("video-section").style.display = "block";
      document.getElementById("quiz-section").style.display = "none";
    };

    function renderQuestions() {
      const wrap = document.getElementById("questions-wrap");
      wrap.innerHTML = "";
      questions.forEach((q, qi) => {
        const qDiv = document.createElement("div");
        qDiv.style.marginBottom = "1.5rem";
        qDiv.innerHTML = `<p style="font-size:15px;font-weight:500;margin-bottom:12px;line-height:1.5;color:var(--text);font-family:var(--font);font-style:normal;">${qi+1}. ${q.question}</p>`;
        (q.options||[]).forEach((opt, oi) => {
          const btn = document.createElement("button");
          btn.className = "answer-btn" + (answers[qi] === oi ? " selected" : "");
          btn.innerHTML = `<span class="answer-letter">${String.fromCharCode(65+oi)}</span>${opt}`;
          btn.onclick = () => { answers[qi] = oi; renderQuestions(); updateSubmitBtn(); };
          qDiv.appendChild(btn);
        });
        if (qi < questions.length - 1) { const d = document.createElement("hr"); d.className = "divider"; qDiv.appendChild(d); }
        wrap.appendChild(qDiv);
      });
      document.getElementById("q-counter").textContent = `${Object.keys(answers).length} / ${questions.length} answered`;
    }

    function updateSubmitBtn() {
      document.getElementById("submit-btn").disabled = Object.keys(answers).length < questions.length;
    }

    window.submitQuiz = async function() {
      const btn = document.getElementById("submit-btn");
      btn.textContent = "Submitting..."; btn.disabled = true;
      try {
        const answerArray = questions.map((q, i) => answers[i] ?? -1);
        const res = await submitQuizFn({ moduleId: MODULE_ID, answers: answerArray });
        const { score, totalQuestions, passed, attempts } = res.data;
        progressData = { ...progressData, status: passed ? "passed" : "failed", quizScore: score, totalQuestions, attempts };
        const resultBox = document.getElementById("result-box");
        resultBox.style.display = "block";
        if (passed) {
          resultBox.className = "result-box result-pass";
          resultBox.innerHTML = `<div style="font-size:2rem;margin-bottom:8px;">✦</div><h2 style="font-family:var(--display);font-size:2rem;letter-spacing:.06em;color:var(--success);margin-bottom:8px;">Passed</h2><p style="color:var(--success);font-style:normal;font-family:var(--cinzel);font-size:12px;letter-spacing:.1em;">${score} / ${totalQuestions} correct</p><a href="dashboard.html" class="btn btn-success" style="margin-top:1rem;">Back to Dashboard →</a>`;
          document.getElementById("passed-badge").style.display = "block";
          document.getElementById("score-badge").textContent = `✓ Passed ${score}/${totalQuestions}`;
          showToast(`Passed! ${score}/${totalQuestions}`, "success");
        } else {
          resultBox.className = "result-box result-fail";
          resultBox.innerHTML = `<h2 style="font-family:var(--display);font-size:2rem;letter-spacing:.06em;color:var(--danger);margin-bottom:8px;">Not Quite</h2><p style="color:var(--danger);font-style:normal;font-family:var(--cinzel);font-size:12px;letter-spacing:.1em;">${score} / ${totalQuestions} — need ${moduleData.passingScore} to pass</p><button class="btn btn-primary" style="margin-top:1rem;" onclick="showQuiz()">Try Again</button>`;
          showToast(`${score}/${totalQuestions} — try again!`, "error");
        }
        renderQuizCTA();
      } catch(e) {
        showToast("Submission failed. Please try again.", "error");
      } finally {
        btn.textContent = "Submit Quiz"; btn.disabled = false;
      }
    };
  </script>
</body>
</html>
