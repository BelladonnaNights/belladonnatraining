<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Belladonna Training — Hardware & laptop</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .video-wrap { position:relative; padding-bottom:56.25%; background:#0f0a0d; border-radius:var(--radius) var(--radius) 0 0; overflow:hidden; }
    .video-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
    .video-shell { border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); margin-bottom:1rem; }
    .video-meta { padding:1rem 1.25rem; background:var(--surface); }
    .quiz-section { display:none; }
    .quiz-section.active { display:block; }
    .result-box { padding:1.5rem; border-radius:var(--radius); text-align:center; margin-top:1rem; }
    .result-pass { background:var(--success-bg); border:1px solid var(--success); }
    .result-fail { background:var(--danger-bg); border:1px solid var(--danger); }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <div class="loading-wrap" id="loading"><div class="spinner"></div></div>

  <main id="main" style="display:none;">
    <div class="page-wrap">

      <!-- Breadcrumb -->
      <div style="margin-bottom:1.5rem;font-size:13px;color:var(--ink-3);">
        <a href="dashboard.html" style="color:var(--brand);">Dashboard</a>
        <span style="margin:0 6px;">›</span>
        <span>Hardware &amp; laptop</span>
      </div>

      <!-- Header -->
      <div style="margin-bottom:1.5rem;" class="flex justify-between items-center" style="flex-wrap:wrap;gap:0.75rem;">
        <div>
          <p class="text-brand" style="font-size:12px;font-weight:500;margin-bottom:4px;">Module 2</p>
          <h1 style="font-size:1.7rem;">Hardware &amp; laptop</h1>
          <p style="margin-top:4px;">Inventory, setup, software, troubleshooting</p>
        </div>
        <div id="passed-badge" style="display:none;">
          <span class="badge badge-pass" style="font-size:14px;padding:6px 16px;" id="score-badge">✓ Passed</span>
        </div>
      </div>

      <!-- Video player (hidden when quiz active) -->
      <div id="video-section">
        <div class="video-shell">
          <div class="video-wrap">
            <iframe id="yt-iframe" src="" allowfullscreen
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
            </iframe>
          </div>
          <div class="video-meta">
            <div id="vid-title" style="font-size:15px;font-weight:500;margin-bottom:4px;"></div>
            <div id="vid-counter" class="text-muted" style="margin-bottom:1rem;"></div>
            <div id="vid-pills" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
          </div>
        </div>

        <!-- Quiz CTA -->
        <div class="card flex justify-between items-center" style="flex-wrap:wrap;gap:1rem;">
          <div>
            <div style="font-size:15px;font-weight:500;margin-bottom:4px;">Module quiz</div>
            <div id="quiz-cta-sub" class="text-muted">Watch all videos to unlock the quiz.</div>
          </div>
          <div id="quiz-cta-btn"></div>
        </div>
      </div>

      <!-- Quiz -->
      <div id="quiz-section" style="display:none;" class="fade-in">
        <div class="card" style="margin-bottom:1rem;">
          <div class="flex justify-between items-center" style="margin-bottom:1.5rem;">
            <h2>Module quiz</h2>
            <span id="q-counter" class="text-muted">0 / 0 answered</span>
          </div>
          <div id="questions-wrap"></div>
        </div>
        <div class="flex justify-between items-center">
          <button class="btn btn-ghost" onclick="showVideos()">← Back to videos</button>
          <button class="btn btn-primary btn-lg" id="submit-btn" onclick="submitQuiz()" disabled>Submit quiz</button>
        </div>
        <div id="result-box" style="display:none;"></div>
      </div>

      <!-- Nav between modules -->
      <div class="flex justify-between items-center" style="margin-top:2rem;">
        <a href="module1.html" class="btn btn-ghost btn-sm">← Module 1</a>
        <a href="dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
        <a href="module3.html" class="btn btn-ghost btn-sm">Module 3 →</a>
      </div>

    </div>
  </main>

  <div class="toast-wrap" id="toast-wrap"></div>

  <script type="module">
    import { requireAuth, renderNav, doLogout, db, showToast, submitQuizFn, markVideoWatched } from "./firebase-init.js";
    import { doc, getDoc, getDocs, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window._logout = doLogout;

    const MODULE_ID = "module_2";
    let videos = [], questions = [], watchedVideos = [], activeVid = 0;
    let answers = {}, currentUser = null, moduleData = null, progressData = null;

    requireAuth(async (user, profile) => {
      currentUser = user;
      document.getElementById("nav-placeholder").innerHTML =
        renderNav(profile, profile.role === "admin");

      // Load module, videos, questions, progress in parallel
      const [modSnap, vidSnap, queSnap, progSnap] = await Promise.all([
        getDoc(doc(db, "modules", MODULE_ID)),
        getDocs(query(collection(db, "modules", MODULE_ID, "videos"), orderBy("order"))),
        getDocs(query(collection(db, "modules", MODULE_ID, "questions"), orderBy("order"))),
        getDoc(doc(db, "users", user.uid, "progress", MODULE_ID)),
      ]);

      if (!modSnap.exists()) { window.location.href = "dashboard.html"; return; }

      moduleData = { id: modSnap.id, ...modSnap.data() };
      videos = vidSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      questions = queSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      if (progSnap.exists()) {
        progressData = progSnap.data();
        watchedVideos = progressData.videosWatched || [];
        if (progressData.status === "passed") {
          document.getElementById("passed-badge").style.display = "block";
          document.getElementById("score-badge").textContent =
            `✓ Passed ${progressData.quizScore}/${moduleData.totalQuestions || questions.length}`;
        }
      }

      renderVideo(0);
      renderQuizCTA();

      document.getElementById("loading").style.display = "none";
      document.getElementById("main").style.display = "block";
    });

    function renderVideo(idx) {
      activeVid = idx;
      const v = videos[idx];
      if (!v) return;

      document.getElementById("yt-iframe").src =
        `https://www.youtube.com/embed/${v.youtubeId}?rel=0`;
      document.getElementById("vid-title").textContent = v.title;
      document.getElementById("vid-counter").textContent =
        `Video ${idx + 1} of ${videos.length}`;

      // Mark as watched after a short delay (simulates loading)
      setTimeout(() => {
        if (!watchedVideos.includes(v.id)) {
          watchedVideos.push(v.id);
          markVideoWatched(currentUser.uid, MODULE_ID, v.id);
          renderPills();
          renderQuizCTA();
        }
      }, 2000);

      renderPills();
    }

    function renderPills() {
      const wrap = document.getElementById("vid-pills");
      wrap.innerHTML = "";
      videos.forEach((v, i) => {
        const watched = watchedVideos.includes(v.id);
        const current = i === activeVid;
        const btn = document.createElement("button");
        btn.className = `vid-pill ${current ? "current" : watched ? "watched" : ""}`;
        btn.textContent = (watched && !current ? "✓ " : "") + v.title;
        btn.onclick = () => renderVideo(i);
        wrap.appendChild(btn);
      });
    }

    function renderQuizCTA() {
      const allWatched = videos.length > 0 && videos.every(v => watchedVideos.includes(v.id));
      const passed = progressData?.status === "passed";
      const sub = document.getElementById("quiz-cta-sub");
      const btnWrap = document.getElementById("quiz-cta-btn");

      if (passed) {
        sub.textContent = `Quiz complete — ${progressData.quizScore}/${moduleData?.totalQuestions || questions.length} correct.`;
        btnWrap.innerHTML = `<a href="dashboard.html" class="btn btn-success">Continue →</a>`;
      } else if (allWatched) {
        const attempts = progressData?.attempts || 0;
        sub.textContent = `Score ${moduleData?.passingScore || 4}/${moduleData?.totalQuestions || questions.length} or higher to unlock the next module.`;
        btnWrap.innerHTML = `<button class="btn btn-primary" onclick="showQuiz()">${attempts > 0 ? `Retake quiz (attempt ${attempts + 1})` : "Take quiz"}</button>`;
      } else {
        sub.textContent = "Watch all videos to unlock the quiz.";
        btnWrap.innerHTML = `<button class="btn btn-primary" disabled>Take quiz</button>`;
      }
    }

    window.showQuiz = function() {
      answers = {};
      renderQuestions();
      document.getElementById("video-section").style.display = "none";
      document.getElementById("quiz-section").style.display = "block";
      document.getElementById("result-box").style.display = "none";
      updateSubmitBtn();
    };

    window.showVideos = function() {
      document.getElementById("video-section").style.display = "block";
      document.getElementById("quiz-section").style.display = "none";
    };

    function renderQuestions() {
      const wrap = document.getElementById("questions-wrap");
      wrap.innerHTML = "";
      questions.forEach((q, qi) => {
        const qDiv = document.createElement("div");
        qDiv.style.marginBottom = "1.5rem";
        qDiv.innerHTML = `
          <p style="font-size:15px;font-weight:500;margin-bottom:10px;line-height:1.4;">
            ${qi + 1}. ${q.question}
          </p>`;
        q.options.forEach((opt, oi) => {
          const btn = document.createElement("button");
          btn.className = "answer-btn" + (answers[qi] === oi ? " selected" : "");
          btn.innerHTML = `<span class="answer-letter">${String.fromCharCode(65+oi)}</span>${opt}`;
          btn.onclick = () => {
            answers[qi] = oi;
            renderQuestions();
            updateSubmitBtn();
          };
          qDiv.appendChild(btn);
        });
        if (qi < questions.length - 1) {
          const div = document.createElement("hr");
          div.className = "divider";
          div.style.marginTop = "1.25rem";
          qDiv.appendChild(div);
        }
        wrap.appendChild(qDiv);
      });
      document.getElementById("q-counter").textContent =
        `${Object.keys(answers).length} / ${questions.length} answered`;
    }

    function updateSubmitBtn() {
      const btn = document.getElementById("submit-btn");
      btn.disabled = Object.keys(answers).length < questions.length;
    }

    window.submitQuiz = async function() {
      const btn = document.getElementById("submit-btn");
      btn.textContent = "Submitting…";
      btn.disabled = true;

      try {
        const answerArray = questions.map((q, i) => answers[i] ?? -1);
        const res = await submitQuizFn({ moduleId: MODULE_ID, answers: answerArray });
        const { score, totalQuestions, passed, attempts } = res.data;

        progressData = { ...progressData, status: passed ? "passed" : "failed", quizScore: score, totalQuestions, attempts };

        const resultBox = document.getElementById("result-box");
        resultBox.style.display = "block";
        if (passed) {
          resultBox.className = "result-box result-pass";
          resultBox.innerHTML = `
            <div style="font-size:2rem;margin-bottom:8px;">🎉</div>
            <h2 style="color:var(--success);margin-bottom:8px;">Passed!</h2>
            <p style="color:var(--success);">${score} / ${totalQuestions} correct</p>
            <a href="dashboard.html" class="btn btn-success" style="margin-top:1rem;">Back to dashboard →</a>`;
          document.getElementById("passed-badge").style.display = "block";
          document.getElementById("score-badge").textContent = `✓ Passed ${score}/${totalQuestions}`;
          showToast(`Passed! ${score}/${totalQuestions} — great work!`, "success");
        } else {
          resultBox.className = "result-box result-fail";
          resultBox.innerHTML = `
            <h2 style="color:var(--danger);margin-bottom:8px;">Not quite</h2>
            <p style="color:var(--danger);">${score} / ${totalQuestions} — need ${moduleData.passingScore} to pass.</p>
            <button class="btn btn-primary" style="margin-top:1rem;" onclick="showQuiz()">Try again</button>`;
          showToast(`${score}/${totalQuestions} — try again!`, "error");
        }
        renderQuizCTA();
      } catch(e) {
        showToast("Submission failed. Please try again.", "error");
      } finally {
        btn.textContent = "Submit quiz";
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
