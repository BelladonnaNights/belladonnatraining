<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Belladonna Training — Sign in</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-box { width: 100%; max-width: 400px; }
    .login-brand { text-align: center; margin-bottom: 2rem; }
    .login-logo { width: 52px; height: 52px; border-radius: 50%; background: var(--brand); margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; }
    .login-logo svg { width: 24px; height: 24px; }
    .login-tagline { font-size: 14px; color: var(--ink-3); margin-top: 4px; }
    .form-group { margin-bottom: 1rem; }
    .login-footer { text-align: center; margin-top: 1.5rem; font-size: 13px; color: var(--ink-3); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box fade-up">

      <div class="login-brand">
        <div class="login-logo">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" fill="white"/>
            <path d="M4 20c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 style="font-size:1.8rem;">Belladonna</h1>
        <p class="login-tagline">Host Training Portal</p>
      </div>

      <div class="card">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@belladonna.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <div id="error-msg" style="display:none;" class="error-msg mt-1"></div>
        <button class="btn btn-primary btn-lg btn-full mt-2" id="login-btn" onclick="handleLogin()">
          Sign in
        </button>
      </div>

      <p class="login-footer">Contact your manager if you need access.</p>
    </div>
  </div>

  <script type="module">
    import { doLogin, auth, db } from "./firebase-init.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Already logged in? Redirect
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = "dashboard.html";
    });

    window.handleLogin = async function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("login-btn");
      const err = document.getElementById("error-msg");

      if (!email || !password) {
        err.textContent = "Please enter your email and password.";
        err.style.display = "block";
        return;
      }

      btn.textContent = "Signing in…";
      btn.disabled = true;
      err.style.display = "none";

      try {
        await doLogin(email, password);
        window.location.href = "dashboard.html";
      } catch (e) {
        err.textContent = "Invalid email or password.";
        err.style.display = "block";
        btn.textContent = "Sign in";
        btn.disabled = false;
      }
    };

    // Allow Enter key to submit
    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") window.handleLogin();
    });
  </script>
</body>
</html>
