<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Belladonna Training — Admin</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── Tabs ── */
    .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:0;}
    .tab{padding:12px 24px;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;font-family:var(--cinzel);cursor:pointer;border:none;background:transparent;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
    .tab:hover{color:var(--text2);}
    .tab.active{color:var(--gold);border-bottom-color:var(--gold);}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}

    /* ── Trainees ── */
    .trainee-row{background:var(--surface);border-bottom:1px solid var(--border);}
    .trainee-header{padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:background .15s;}
    .trainee-header:hover{background:var(--surface2);}
    .trainee-header.expanded{background:var(--surface2);border-left:2px solid var(--gold-border);}
    .trainee-detail{padding:1rem 1.5rem 1.25rem;background:var(--surface2);border-top:1px solid var(--border);display:none;}
    .trainee-detail.open{display:block;}
    .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;}
    .detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;}
    .detail-card-label{font-family:var(--cinzel);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
    .quiz-line{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}
    .quiz-line:last-child{border-bottom:none;}
    .chevron{font-size:12px;color:var(--text3);transition:transform .18s;flex-shrink:0;}
    .chevron.open{transform:rotate(180deg);}
    .add-trainee-form{background:var(--surface);border:1px solid var(--gold-border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:2rem;}
    .form-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:flex-end;}
    @media(max-width:700px){.form-row{grid-template-columns:1fr;}}
    .form-field{display:flex;flex-direction:column;}

    /* ── Content editor layout ── */
    .content-layout{display:flex;min-height:calc(100vh - 130px);border-top:1px solid var(--border);}

    /* ── Content sidebar ── */
    .content-sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;position:sticky;top:0;max-height:calc(100vh - 130px);flex-shrink:0;width:260px;min-width:160px;max-width:500px;}

    /* ── Resize handle ── */
    .resize-handle{width:5px;background:transparent;cursor:col-resize;flex-shrink:0;transition:background .15s;position:relative;}
    .resize-handle:hover,.resize-handle.dragging{background:var(--gold-border);}
    .resize-handle::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:40px;border-radius:2px;background:var(--border2);}
    .cs-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .cs-label{font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);}
    .cs-add-btn{width:20px;height:20px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;transition:all .15s;}
    .cs-add-btn:hover{background:var(--gold);color:#000;}

    /* Module rows in sidebar */
    .cs-mod{border-bottom:1px solid var(--border);}
    .cs-mod-row{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;transition:background .15s;user-select:none;}
    .cs-mod-row:hover{background:var(--surface2);}
    .cs-mod-row.active{background:var(--surface2);border-left:2px solid var(--gold);}
    .cs-mod-row.drag-over{background:var(--gold-dim);}
    .cs-drag{color:var(--text3);font-size:13px;cursor:grab;flex-shrink:0;padding:2px;}
    .cs-drag:active{cursor:grabbing;}
    .cs-num{font-family:var(--cinzel);font-size:10px;font-weight:600;color:var(--text3);width:22px;flex-shrink:0;text-align:center;}
    .cs-title{flex:1;font-family:var(--cinzel);font-size:11px;font-weight:600;letter-spacing:.03em;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .cs-title.active{color:var(--gold);}
    .cs-chevron{font-size:10px;color:var(--text3);transition:transform .15s;flex-shrink:0;}
    .cs-chevron.open{transform:rotate(180deg);}
    .cs-mod-actions{display:flex;gap:4px;flex-shrink:0;}
    .cs-icon-btn{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:2px 4px;border-radius:4px;transition:all .15s;line-height:1;}
    .cs-icon-btn:hover{color:var(--gold);background:var(--gold-dim);}
    .cs-icon-btn.del:hover{color:var(--danger);background:var(--danger-bg);}

    /* Sub-module rows */
    .cs-sub-list{display:none;background:var(--bg);}
    .cs-sub-list.open{display:block;}
    .cs-sub-row{display:flex;align-items:center;gap:6px;padding:7px 10px 7px 28px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);user-select:none;}
    .cs-sub-row:last-child{border-bottom:none;}
    .cs-sub-row:hover{background:var(--surface2);}
    .cs-sub-row.active{background:var(--surface2);border-left:2px solid var(--gold-border);}
    .cs-sub-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);flex-shrink:0;}
    .cs-sub-dot.active{background:var(--gold);}
    .cs-sub-title{flex:1;font-family:var(--font);font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .cs-sub-title.active{color:var(--text);}

    /* ── Editor panel ── */
    .editor-panel{padding:1.5rem;overflow-y:auto;max-height:calc(100vh - 130px);}
    .editor-heading{font-family:var(--display);font-size:1.6rem;letter-spacing:.06em;margin-bottom:4px;}
    .editor-subhead{font-family:var(--cinzel);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:1.5rem;}
    .editor-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1rem;overflow:hidden;}
    .editor-section-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .editor-section-title{font-family:var(--cinzel);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);}
    .editor-section-body{padding:1rem;}
    .item-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;display:flex;gap:8px;align-items:flex-start;}
    .item-card.dragging{opacity:.4;}
    .item-fields{flex:1;display:flex;flex-direction:column;gap:6px;}
    .drag-handle{cursor:grab;color:var(--text3);padding:4px;font-size:14px;flex-shrink:0;user-select:none;}
    .drag-handle:active{cursor:grabbing;}
    .option-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
    .correct-radio{width:16px;height:16px;accent-color:var(--gold);flex-shrink:0;cursor:pointer;}
    .add-item-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:10px;font-family:var(--cinzel);letter-spacing:.1em;text-transform:uppercase;color:var(--gold);border:1px dashed var(--gold-border);background:var(--gold-dim);border-radius:var(--radius);cursor:pointer;transition:all .15s;width:100%;justify-content:center;margin-top:4px;}
    .add-item-btn:hover{background:rgba(201,168,76,.18);}
    .save-bar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:.75rem 0;margin-top:1rem;display:flex;justify-content:flex-end;gap:10px;align-items:center;}
    .save-status{font-family:var(--cinzel);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
    .save-status.saved{color:var(--success);}
    .delete-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:4px 6px;flex-shrink:0;transition:color .15s;}
    .delete-btn:hover{color:var(--danger);}
    .youtube-preview{margin-top:8px;border-radius:var(--radius);overflow:hidden;}
    .youtube-preview iframe{width:100%;aspect-ratio:16/9;border:none;display:block;}
    .img-preview{margin-top:8px;border-radius:var(--radius);overflow:hidden;max-height:180px;}
    .img-preview img{width:100%;object-fit:cover;display:block;}
    .input-std{background:var(--surface);border:1px solid var(--gold-border);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-family:var(--font);font-size:14px;width:100%;}
    .textarea-std{background:var(--surface);border:1px solid var(--gold-border);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-family:var(--font);font-size:14px;width:100%;resize:vertical;min-height:80px;}
    .empty-editor{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--text3);font-family:var(--serif);font-style:italic;text-align:center;gap:1rem;}
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div class="loading-wrap" id="loading"><div class="spinner"></div><p>Loading admin...</p></div>

  <main id="main" style="display:none;">
    <div style="max-width:1200px;margin:0 auto;padding:1.5rem 1.5rem 0;">
      <div class="fade-up" style="margin-bottom:1rem;">
        <p style="font-family:var(--cinzel);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;font-style:normal;">Admin Panel</p>
        <h1 class="gold-text">Training Management</h1>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('trainees')">Trainees</button>
        <button class="tab" onclick="switchTab('content')">Module Content</button>
      </div>
    </div>

    <!-- TRAINEES TAB -->
    <div class="tab-panel active" id="tab-trainees" style="padding:1.5rem;max-width:1200px;margin:0 auto;">
      <div id="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:2rem;"></div>
      <div class="add-trainee-form fade-up">
        <h3 style="font-family:var(--display);font-size:1.4rem;letter-spacing:.06em;margin-bottom:1rem;">Add New Trainee</h3>
        <div class="form-row">
          <div class="form-field"><label>Full name</label><input type="text" id="new-name" placeholder="Jordan Smith" class="input-std"/></div>
          <div class="form-field"><label>Email</label><input type="email" id="new-email" placeholder="jordan@belladonna.com" class="input-std"/></div>
          <div class="form-field"><label>Temp password</label><input type="text" id="new-password" placeholder="Min 6 chars" class="input-std"/></div>
          <div class="form-field"><label style="opacity:0;">x</label><button class="btn btn-primary" id="add-trainee-btn" onclick="handleAddTrainee()">Add Trainee</button></div>
        </div>
        <div id="add-trainee-error" style="display:none;margin-top:10px;" class="error-msg"></div>
      </div>
      <div class="card fade-up" style="padding:0;overflow:hidden;">
        <div style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <h3>All Trainees</h3><span id="trainee-count" class="text-muted"></span>
        </div>
        <div id="trainee-list"></div>
      </div>
    </div>

    <!-- CONTENT TAB -->
    <div class="tab-panel" id="tab-content">
      <div class="content-layout" id="content-layout">
        <!-- Content sidebar -->
        <div class="content-sidebar" id="content-sidebar">
          <div class="cs-header">
            <span class="cs-label">Modules</span>
            <button class="cs-add-btn" title="Add new module" onclick="addModule()">+</button>
          </div>
          <div id="cs-module-list"></div>
        </div>
        <!-- Resize handle -->
        <div class="resize-handle" id="resize-handle"></div>
        <!-- Editor panel -->
        <div class="editor-panel" id="editor-panel" style="flex:1;overflow-y:auto;max-height:calc(100vh - 130px);">
          <div class="empty-editor">
            <div style="font-size:2rem;">✦</div>
            <p>Select a module or sub-module<br>from the sidebar to edit.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-wrap" id="toast-wrap"></div>

  <script type="module">
    import { requireAdmin, renderNav, doLogout, db, showToast, adminSignOffFn, revokeSignOffFn, createTrainee } from "./firebase-init.js";
    import { collection, getDocs, doc, getDoc, setDoc, deleteDoc, serverTimestamp, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window._logout = doLogout;

    const MODULES_COUNT = 6;
    const SIGNOFF_STEPS = [
      {key:"dryRunComplete",label:"Dry Run",dateKey:"dryRunDate"},
      {key:"shadowGigComplete",label:"Shadow Gig",dateKey:"shadowGigDate"},
      {key:"soloLaunchComplete",label:"Solo Launch",dateKey:"soloLaunchDate"},
    ];

    let allTrainees=[], certMap={}, progressMap={};

    // All modules data (array, ordered)
    let modulesData = []; // [{id, title, description, content, bannerImage, passingScore, totalQuestions, order, submodules:[], videos:[], questions:[], _open:bool}]
    let activeModuleIdx = null;
    let activeSubmoduleIdx = null; // null = editing parent module
    let activeView = null; // 'module' | 'submodule'
    let dragSrc = null, dragType = null;

    // ── Tab switch ────────────────────────────────────────────────────────────
    window.switchTab = function(tab) {
      document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",["trainees","content"][i]===tab));
      document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
      document.getElementById(`tab-${tab}`).classList.add("active");
      if (tab==="content" && modulesData.length===0) loadAllModules();
    };

    // ── Init ──────────────────────────────────────────────────────────────────
    requireAdmin(async (user, profile) => {
      document.getElementById("nav-placeholder").innerHTML = renderNav(profile, true);
      await loadTrainees();
      document.getElementById("loading").style.display="none";
      document.getElementById("main").style.display="block";
    });

    // ── Load all modules ──────────────────────────────────────────────────────
    async function loadAllModules() {
      const panel = document.getElementById("cs-module-list");
      panel.innerHTML=`<div style="padding:1rem;text-align:center;"><div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0 auto;"></div></div>`;
      
      // Try ordered fetch first, fall back to unordered if no order field exists
      let snap;
      try {
        snap = await getDocs(query(collection(db,"modules"),orderBy("order")));
        if (snap.empty) throw new Error("empty ordered");
      } catch(e) {
        snap = await getDocs(collection(db,"modules"));
      }

      let docs = snap.docs.map(d => ({id:d.id,...d.data()}));
      // Sort: by order field if present, otherwise by module number in ID, otherwise by title
      docs.sort((a,b) => {
        const aOrder = a.order ?? parseInt(a.id.replace(/\D/g,"")) ?? 999;
        const bOrder = b.order ?? parseInt(b.id.replace(/\D/g,"")) ?? 999;
        return aOrder - bOrder;
      });

      modulesData = await Promise.all(docs.map(async (d,i) => {
        const m = {...d, order: d.order ?? i+1, _open:false};
        await loadModuleSubdata(m);
        return m;
      }));
      renderSidebar();
    }

    async function loadModuleSubdata(m) {
      const [vidSnap,queSnap,subSnap] = await Promise.all([
        getDocs(query(collection(db,"modules",m.id,"videos"),orderBy("order"))).catch(()=>({docs:[]})),
        getDocs(query(collection(db,"modules",m.id,"questions"),orderBy("order"))).catch(()=>({docs:[]})),
        getDocs(query(collection(db,"modules",m.id,"submodules"),orderBy("order"))).catch(()=>({docs:[]})),
      ]);
      m.videos = vidSnap.docs.map(d=>({id:d.id,...d.data()}));
      m.questions = queSnap.docs.map(d=>({id:d.id,...d.data()}));
      m.contentBlocks = (m.content||"").split("\n\n").filter(b=>b.trim()).map((b,i)=>({tempId:`b${i}`,text:b.trim()}));
      m.submodules = await Promise.all(subSnap.docs.map(async sd=>{
        const sub={id:sd.id,...sd.data()};
        const [svSnap,siSnap]=await Promise.all([
          getDocs(query(collection(db,"modules",m.id,"submodules",sd.id,"videos"),orderBy("order"))).catch(()=>({docs:[]})),
          getDocs(query(collection(db,"modules",m.id,"submodules",sd.id,"images"),orderBy("order"))).catch(()=>({docs:[]})),
        ]);
        sub.videos=svSnap.docs.map(v=>({id:v.id,...v.data()}));
        sub.images=siSnap.docs.map(i=>({id:i.id,...i.data()}));
        sub.contentBlocks=(sub.content||"").split("\n\n").filter(b=>b.trim()).map((b,i)=>({tempId:`sb${i}`,text:b.trim()}));
        return sub;
      }));
    }

    // ── Sidebar ───────────────────────────────────────────────────────────────
    function renderSidebar() {
      const list = document.getElementById("cs-module-list");
      list.innerHTML = "";
      modulesData.forEach((mod, mi) => {
        const isActiveMod = activeView==="module" && activeModuleIdx===mi;
        const modDiv = document.createElement("div");
        modDiv.className = "cs-mod";
        modDiv.dataset.mi = mi;

        // Module row
        const row = document.createElement("div");
        row.className = `cs-mod-row ${isActiveMod?"active":""}`;
        row.draggable = true;
        row.dataset.mi = mi;
        row.innerHTML = `
          <span class="cs-drag" title="Drag to reorder">⠿</span>
          <span class="cs-num">${mi+1}</span>
          <span class="cs-title ${isActiveMod?"active":""}">${mod.title||"Untitled module"}</span>
          <span class="cs-mod-actions">
            <button class="cs-icon-btn" title="Add sub-module" onclick="event.stopPropagation();addSubmodule(${mi})">+</button>
            <button class="cs-icon-btn del" title="Delete module" onclick="event.stopPropagation();deleteModule(${mi})">✕</button>
          </span>
          <span class="cs-chevron ${mod._open?"open":""}" id="cs-chev-${mi}">▾</span>`;
        row.addEventListener("click", ()=>selectModule(mi));
        addSidebarDrag(row, mi);
        modDiv.appendChild(row);

        // Sub-module list
        const subList = document.createElement("div");
        subList.className = `cs-sub-list ${mod._open?"open":""}`;
        subList.id = `cs-sublist-${mi}`;

        (mod.submodules||[]).forEach((sub,si) => {
          const isActiveSub = activeView==="submodule" && activeModuleIdx===mi && activeSubmoduleIdx===si;
          const subRow = document.createElement("div");
          subRow.className = `cs-sub-row ${isActiveSub?"active":""}`;
          subRow.innerHTML = `
            <span class="cs-drag" style="font-size:11px;" title="Drag to reorder">⠿</span>
            <span class="cs-sub-dot ${isActiveSub?"active":""}"></span>
            <span class="cs-sub-title ${isActiveSub?"active":""}">${sub.order?sub.order+" — ":""}${sub.title||"Untitled"}</span>
            <button class="cs-icon-btn del" title="Delete" onclick="event.stopPropagation();deleteSubmodule(${mi},${si})">✕</button>`;
          subRow.addEventListener("click", ()=>selectSubmodule(mi,si));
          subList.appendChild(subRow);
        });

        modDiv.appendChild(subList);
        list.appendChild(modDiv);
      });
    }

    // ── Sidebar drag to reorder modules ───────────────────────────────────────
    function addSidebarDrag(row, mi) {
      row.addEventListener("dragstart", e=>{
        dragSrc=row; dragType="module";
        e.dataTransfer.effectAllowed="move";
        e.dataTransfer.setData("text/plain", mi);
        setTimeout(()=>row.style.opacity="0.4",0);
      });
      row.addEventListener("dragend", ()=>{ row.style.opacity="1"; dragSrc=null; });
      row.addEventListener("dragover", e=>{ e.preventDefault(); row.closest(".cs-mod").classList.add("drag-over"); });
      row.addEventListener("dragleave", ()=>row.closest(".cs-mod").classList.remove("drag-over"));
      row.addEventListener("drop", e=>{
        e.preventDefault();
        row.closest(".cs-mod").classList.remove("drag-over");
        if (!dragSrc || dragType!=="module") return;
        const fromIdx = parseInt(e.dataTransfer.getData("text/plain"));
        const toIdx = mi;
        if (fromIdx===toIdx) return;
        const item = modulesData.splice(fromIdx,1)[0];
        modulesData.splice(toIdx,0,item);
        // Update order numbers
        modulesData.forEach((m,i)=>m.order=i+1);
        // If active module moved, update index
        if (activeModuleIdx===fromIdx) activeModuleIdx=toIdx;
        else if (activeModuleIdx>fromIdx && activeModuleIdx<=toIdx) activeModuleIdx--;
        else if (activeModuleIdx<fromIdx && activeModuleIdx>=toIdx) activeModuleIdx++;
        renderSidebar();
        showToast("Reordered — click Save to persist.","info");
      });
    }

    // ── Select module / submodule ─────────────────────────────────────────────
    function selectModule(mi) {
      // Toggle open/close
      if (activeView==="module" && activeModuleIdx===mi) {
        modulesData[mi]._open = !modulesData[mi]._open;
        renderSidebar();
        return;
      }
      // Close previously open
      if (activeModuleIdx!==null && activeModuleIdx!==mi) modulesData[activeModuleIdx]._open=false;
      activeModuleIdx = mi;
      activeSubmoduleIdx = null;
      activeView = "module";
      modulesData[mi]._open = true;
      renderSidebar();
      renderModuleEditor(mi);
    }

    window.selectSubmodule = function(mi, si) {
      activeModuleIdx = mi;
      activeSubmoduleIdx = si;
      activeView = "submodule";
      renderSidebar();
      renderSubmoduleEditor(mi, si);
    };

    // ── Add / delete module ───────────────────────────────────────────────────
    window.addModule = function() {
      const newId = `module_${Date.now()}`;
      const newOrder = modulesData.length + 1;
      modulesData.push({
        id:newId, title:"New Module", description:"", content:"", bannerImage:"",
        passingScore:4, totalQuestions:5, order:newOrder,
        contentBlocks:[], videos:[], questions:[], submodules:[], _open:true, _new:true
      });
      activeModuleIdx = modulesData.length-1;
      activeSubmoduleIdx = null;
      activeView = "module";
      renderSidebar();
      renderModuleEditor(activeModuleIdx);
      showToast("New module added — fill in details and save.","info");
    };

    window.deleteModule = async function(mi) {
      const mod = modulesData[mi];
      const modName = mod.title || "this module";
      const typed = prompt(`⚠️ PERMANENT DELETE\n\nThis will delete "${modName}" and ALL its sub-modules, videos, and questions.\n\nType the module title exactly to confirm:`);
      if (typed === null) return;
      if (typed.trim() !== modName.trim()) {
        alert(`Title didn't match — "${modName}" was NOT deleted.`);
        return;
      }
      if (!mod._new) {
        // Delete from Firestore
        try {
          const subSnap = await getDocs(collection(db,"modules",mod.id,"submodules"));
          for (const sd of subSnap.docs) {
            const svSnap=await getDocs(collection(db,"modules",mod.id,"submodules",sd.id,"videos"));
            const siSnap=await getDocs(collection(db,"modules",mod.id,"submodules",sd.id,"images"));
            await Promise.all([...svSnap.docs,...siSnap.docs].map(d=>deleteDoc(d.ref)));
            await deleteDoc(sd.ref);
          }
          const vidSnap=await getDocs(collection(db,"modules",mod.id,"videos"));
          const queSnap=await getDocs(collection(db,"modules",mod.id,"questions"));
          await Promise.all([...vidSnap.docs,...queSnap.docs].map(d=>deleteDoc(d.ref)));
          await deleteDoc(doc(db,"modules",mod.id));
        } catch(e){ showToast("Error deleting from database.","error"); return; }
      }
      modulesData.splice(mi,1);
      modulesData.forEach((m,i)=>m.order=i+1);
      if (activeModuleIdx===mi) { activeModuleIdx=null; activeView=null; document.getElementById("editor-panel").innerHTML=`<div class="empty-editor"><div style="font-size:2rem;">✦</div><p>Select a module from the sidebar.</p></div>`; }
      else if (activeModuleIdx>mi) activeModuleIdx--;
      renderSidebar();
      showToast("Module deleted.","success");
    };

      if (!mod.submodules) mod.submodules = [];
      mod.submodules.push({
        id:`sub_${Date.now()}`, title:"New Sub-module", description:"", content:"",
        bannerImage:"", order, contentBlocks:[], videos:[], images:[], _new:true
      });
      mod._open = true;
      activeModuleIdx = mi;
      activeSubmoduleIdx = mod.submodules.length-1;
      activeView = "submodule";
      renderSidebar();
      renderSubmoduleEditor(mi, activeSubmoduleIdx);
      showToast("Sub-module added — fill in details and save.","info");
    };

    window.deleteSubmodule = async function(mi, si) {
      const sub = modulesData[mi].submodules[si];
      if (!confirm(`Delete "${sub.title||"this sub-module"}"?`)) return;
      if (!sub._new) {
        try {
          const mod = modulesData[mi];
          const svSnap=await getDocs(collection(db,"modules",mod.id,"submodules",sub.id,"videos"));
          const siSnap=await getDocs(collection(db,"modules",mod.id,"submodules",sub.id,"images"));
          await Promise.all([...svSnap.docs,...siSnap.docs].map(d=>deleteDoc(d.ref)));
          await deleteDoc(doc(db,"modules",mod.id,"submodules",sub.id));
        } catch(e){ showToast("Error deleting.","error"); return; }
      }
      modulesData[mi].submodules.splice(si,1);
      if (activeView==="submodule" && activeModuleIdx===mi && activeSubmoduleIdx===si) {
        activeSubmoduleIdx=null; activeView="module";
        renderModuleEditor(mi);
      }
      renderSidebar();
      showToast("Sub-module deleted.","success");
    };

    // ── Save module ───────────────────────────────────────────────────────────
    window.saveModule = async function(mi) {
      const btn=document.getElementById("save-mod-btn");
      btn.textContent="Saving...";btn.disabled=true;
      const mod=modulesData[mi];
      try {
        mod.title=document.getElementById("mod-title").value.trim();
        mod.description=document.getElementById("mod-desc").value.trim();
        mod.bannerImage=document.getElementById("mod-banner").value.trim();
        mod.passingScore=parseInt(document.getElementById("mod-passing").value)||4;
        mod.totalQuestions=parseInt(document.getElementById("mod-total").value)||5;
        mod.order=mi+1;
        const content=mod.contentBlocks.map(b=>b.text).join("\n\n");

        // Save module order for all modules (in case of reorder)
        await Promise.all(modulesData.map((m,i)=>setDoc(doc(db,"modules",m.id),{
          id:m.id,order:i+1,title:m.title||"",description:m.description||"",
          content:m.contentBlocks?m.contentBlocks.map(b=>b.text).join("\n\n"):"",
          bannerImage:m.bannerImage||"",passingScore:m.passingScore||4,totalQuestions:m.totalQuestions||5
        })));

        // Save videos
        const oldVids=await getDocs(collection(db,"modules",mod.id,"videos"));
        await Promise.all(oldVids.docs.map(d=>deleteDoc(d.ref)));
        await Promise.all(mod.videos.map((v,i)=>setDoc(doc(db,"modules",mod.id,"videos",v.id||`video_${i+1}`),{id:v.id||`video_${i+1}`,order:i+1,title:v.title||"",youtubeId:v.youtubeId||""})));

        // Save questions
        const oldQues=await getDocs(collection(db,"modules",mod.id,"questions"));
        await Promise.all(oldQues.docs.map(d=>deleteDoc(d.ref)));
        await Promise.all(mod.questions.map((q,i)=>setDoc(doc(db,"modules",mod.id,"questions",q.id||`q${i+1}`),{order:i+1,question:q.question||"",options:q.options||["","","",""],correctIndex:q.correctIndex||0})));

        mod._new=false;
        renderSidebar();
        showToast("Module saved.","success");
      } catch(e){ showToast("Save failed: "+e.message,"error"); console.error(e); }
      finally{ btn.textContent="Save Module";btn.disabled=false; }
    };

    // ── Save submodule ────────────────────────────────────────────────────────
    window.saveSubmodule = async function(mi, si) {
      const btn=document.getElementById("save-sub-btn");
      btn.textContent="Saving...";btn.disabled=true;
      const mod=modulesData[mi], sub=mod.submodules[si];
      try {
        sub.order=document.getElementById("sub-order").value.trim();
        sub.title=document.getElementById("sub-title").value.trim();
        sub.description=document.getElementById("sub-desc").value.trim();
        sub.bannerImage=document.getElementById("sub-banner").value.trim();
        const content=(sub.contentBlocks||[]).map(b=>b.text).join("\n\n");

        await setDoc(doc(db,"modules",mod.id,"submodules",sub.id),{
          id:sub.id,order:sub.order||`${mi+1}.${si+1}`,title:sub.title||"",
          description:sub.description||"",content,bannerImage:sub.bannerImage||""
        });

        const oldSV=await getDocs(collection(db,"modules",mod.id,"submodules",sub.id,"videos"));
        await Promise.all(oldSV.docs.map(d=>deleteDoc(d.ref)));
        await Promise.all((sub.videos||[]).map((v,i)=>setDoc(doc(db,"modules",mod.id,"submodules",sub.id,"videos",v.id||`sv_${i+1}`),{id:v.id||`sv_${i+1}`,order:i+1,title:v.title||"",youtubeId:v.youtubeId||""})));

        const oldSI=await getDocs(collection(db,"modules",mod.id,"submodules",sub.id,"images"));
        await Promise.all(oldSI.docs.map(d=>deleteDoc(d.ref)));
        await Promise.all((sub.images||[]).map((img,i)=>setDoc(doc(db,"modules",mod.id,"submodules",sub.id,"images",img.id||`img_${i+1}`),{id:img.id||`img_${i+1}`,order:i+1,url:img.url||"",caption:img.caption||""})));

        sub._new=false;
        renderSidebar();
        showToast("Sub-module saved.","success");
      } catch(e){ showToast("Save failed: "+e.message,"error"); console.error(e); }
      finally{ btn.textContent="Save Sub-module";btn.disabled=false; }
    };

    // ── Item drag (videos, questions, content blocks) ─────────────────────────
    function addItemDrag(el, type, mi, si, rerender) {
      el.addEventListener("dragstart",e=>{ dragSrc=el; dragType=type; el.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; });
      el.addEventListener("dragend",()=>{ el.classList.remove("dragging"); dragSrc=null; });
      el.addEventListener("dragover",e=>e.preventDefault());
      el.addEventListener("drop",e=>{
        e.preventDefault();
        if(!dragSrc||dragSrc===el||dragType!==type)return;
        const from=parseInt(dragSrc.dataset.idx),to=parseInt(el.dataset.idx);
        const mod=modulesData[mi];
        let arr;
        if(type==="mod-content")arr=mod.contentBlocks;
        else if(type==="mod-video")arr=mod.videos;
        else if(type==="mod-question")arr=mod.questions;
        if(arr){const item=arr.splice(from,1)[0];arr.splice(to,0,item);rerender(mi);}
      });
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function makeEl(tag, placeholder, value, onChange, className) {
      const el=document.createElement(tag==="textarea"?"textarea":"input");
      if(tag!=="textarea")el.type="text";
      el.placeholder=placeholder; el.value=value; el.className=className||"input-std";
      el.addEventListener("input",onChange);
      return el;
    }

    function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

    // ── TRAINEES (unchanged) ──────────────────────────────────────────────────
    window.handleAddTrainee = async function() {
      const name=document.getElementById("new-name").value.trim();
      const email=document.getElementById("new-email").value.trim();
      const password=document.getElementById("new-password").value.trim();
      const errEl=document.getElementById("add-trainee-error");
      const btn=document.getElementById("add-trainee-btn");
      errEl.style.display="none";
      if(!name||!email||!password){errEl.textContent="Please fill in all fields.";errEl.style.display="block";return;}
      if(password.length<6){errEl.textContent="Password must be at least 6 characters.";errEl.style.display="block";return;}
      btn.textContent="Adding...";btn.disabled=true;
      try {
        const result=await createTrainee(email,password,name);
        // Store temp password in Firestore so admin can look it up
        await setDoc(doc(db,"users",result.uid),{tempPassword:password},{merge:true});
        showToast(`${name} added!`,"success");
        document.getElementById("new-name").value="";
        document.getElementById("new-email").value="";
        document.getElementById("new-password").value="";
        allTrainees.push({id:result.uid,name,email,role:"trainee",certified:false,tempPassword:password});
        progressMap[result.uid]={};certMap[result.uid]={};
        renderStats();renderTrainees();
      } catch(e){
        let msg="Failed to add trainee.";
        if(e.code==="auth/email-already-in-use")msg="Email already registered.";
        else if(e.code==="auth/invalid-email")msg="Invalid email.";
        errEl.textContent=msg;errEl.style.display="block";
      } finally{btn.textContent="Add Trainee";btn.disabled=false;}
    };

    async function loadTrainees() {
      const [usersSnap,certsSnap]=await Promise.all([getDocs(collection(db,"users")),getDocs(collection(db,"certifications"))]);
      allTrainees=usersSnap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.role!=="admin");
      certsSnap.forEach(d=>{certMap[d.id]=d.data();});
      await Promise.all(allTrainees.map(async u=>{
        const snap=await getDocs(collection(db,"users",u.id,"progress"));
        const p={};snap.forEach(d=>{p[d.id]=d.data();});progressMap[u.id]=p;
      }));
      renderStats();renderTrainees();
    }

    function countPassed(prog){return Object.values(prog||{}).filter(p=>p.status==="passed").length;}

    function renderStats(){
      document.getElementById("stats-grid").innerHTML=[
        {label:"Total Trainees",value:allTrainees.length},
        {label:"Certified",value:allTrainees.filter(t=>t.certified).length},
        {label:"In Progress",value:allTrainees.filter(t=>!t.certified&&countPassed(progressMap[t.id])>0).length},
        {label:"Not Started",value:allTrainees.filter(t=>countPassed(progressMap[t.id])===0&&!t.certified).length},
      ].map(s=>`<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-num">${s.value}</div></div>`).join("");
      document.getElementById("trainee-count").textContent=`${allTrainees.length} total`;
    }

    function renderTrainees(){
      const list=document.getElementById("trainee-list");
      list.innerHTML="";
      if(!allTrainees.length){list.innerHTML=`<div style="padding:3rem;text-align:center;font-family:var(--serif);font-style:italic;color:var(--text3);">No trainees yet.</div>`;return;}
      [...allTrainees].sort((a,b)=>countPassed(progressMap[b.id])-countPassed(progressMap[a.id])).forEach(trainee=>{
        const passed=countPassed(progressMap[trainee.id]),pct=Math.round((passed/MODULES_COUNT)*100),cert=certMap[trainee.id]||{};
        const dots=SIGNOFF_STEPS.map(s=>`<div title="${s.label}" style="width:8px;height:8px;border-radius:50%;background:${cert[s.key]?"var(--success)":"var(--surface3)"};border:1px solid ${cert[s.key]?"var(--success)":"var(--border2)"};"></div>`).join("");
        const row=document.createElement("div");row.className="trainee-row";row.id=`row-${trainee.id}`;
        row.innerHTML=`
          <div class="trainee-header" onclick="toggleTrainee('${trainee.id}')">
            <div style="width:36px;height:36px;border-radius:50%;border:1px solid ${trainee.certified?"var(--success-border)":"var(--border2)"};background:${trainee.certified?"var(--success-bg)":"var(--surface2)"};display:flex;align-items:center;justify-content:center;font-family:var(--cinzel);font-size:12px;color:${trainee.certified?"var(--success)":"var(--text3)"};flex-shrink:0;">${trainee.certified?"✓":trainee.name?.charAt(0)||"?"}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-family:var(--cinzel);font-size:13px;font-weight:600;letter-spacing:.04em;">${trainee.name}${trainee.certified?`<span class="badge badge-pass" style="margin-left:8px;font-size:9px;">Certified</span>`:""}</div>
              <div style="font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${trainee.email}</div>
            </div>
            <div style="width:120px;flex-shrink:0;">
              <div style="font-family:var(--cinzel);font-size:10px;color:var(--text3);text-align:right;margin-bottom:4px;">${passed}/${MODULES_COUNT}</div>
              <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
            </div>
            <div style="display:flex;gap:3px;flex-shrink:0;padding:0 12px;">${dots}</div>
            <div class="chevron" id="chev-${trainee.id}">▾</div>
          </div>
          <div class="trainee-detail" id="detail-${trainee.id}">${buildDetail(trainee,cert)}</div>`;
        list.appendChild(row);
      });
    }

    function buildDetail(trainee,cert){
      let qr="";
      for(let i=1;i<=MODULES_COUNT;i++){const mId=`module_${i}`,mp=progressMap[trainee.id]?.[mId];let txt="Not started",c="var(--text3)";if(mp?.status==="passed"){txt=`✓ ${mp.quizScore}/${mp.totalQuestions||5}`;c="var(--success)";}else if(mp?.status==="failed"){txt=`✗ ${mp.quizScore}/${mp.totalQuestions||5}`;c="var(--danger)";}else if(mp?.status==="in_progress"){txt="In progress";c="var(--gold)";}qr+=`<div class="quiz-line"><span style="color:var(--text2);">Module ${i}</span><span style="color:${c};">${txt}</span></div>`;}

      const pwCard = `
        <div class="detail-card">
          <div class="detail-card-label">Login password</div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <input type="password" id="pw-${trainee.id}" value="${trainee.tempPassword||""}"
              readonly
              style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--text);font-family:var(--font);font-size:13px;flex:1;width:auto;"/>
            <button class="btn btn-ghost btn-sm" onclick="togglePw('${trainee.id}')">Show</button>
          </div>
          ${trainee.tempPassword
            ? `<p style="font-size:11px;color:var(--text3);font-family:var(--font);font-style:normal;">This is the password you set. If they changed it, this won't reflect the new one.</p>`
            : `<p style="font-size:11px;color:var(--text3);font-family:var(--font);font-style:normal;">No password stored — this trainee was added before this feature existed.</p>`
          }
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn btn-ghost btn-sm" onclick="updatePassword('${trainee.id}')">Set new password</button>
          </div>
        </div>`;

      return `<div class="detail-grid"><div class="detail-card"><div class="detail-card-label">Quiz Progress</div>${qr}</div>${pwCard}${SIGNOFF_STEPS.map(step=>{const done=cert[step.key],dv=cert[step.dateKey];const ds=dv?new Date(dv.seconds*1000).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"";return `<div class="detail-card"><div class="detail-card-label">${step.label}</div>${done?`<div class="badge badge-pass" style="margin-bottom:10px;display:block;">✓${ds?" · "+ds:""}</div><button class="btn btn-ghost btn-sm" onclick="handleRevoke('${trainee.id}','${step.key}','${step.dateKey}')">Revoke</button>`:`<div class="badge badge-locked" style="margin-bottom:10px;display:block;">Pending</div><button class="btn btn-primary btn-sm" onclick="handleSignOff('${trainee.id}','${step.key}','${step.dateKey}')">Sign Off ✓</button>`}</div>`;}).join("")}</div>`;
    }

    window.togglePw = function(uid) {
      const input = document.getElementById(`pw-${uid}`);
      const btn = input?.nextElementSibling;
      if (!input) return;
      if (input.type === "password") {
        input.type = "text";
        if (btn) btn.textContent = "Hide";
      } else {
        input.type = "password";
        if (btn) btn.textContent = "Show";
      }
    };

    window.updatePassword = async function(uid) {
      const newPw = prompt("Enter a new password for this trainee (min 6 characters):");
      if (!newPw) return;
      if (newPw.length < 6) { alert("Password must be at least 6 characters."); return; }
      try {
        // Save to Firestore so admin can see it
        await setDoc(doc(db,"users",uid),{tempPassword:newPw},{merge:true});
        // Update local
        const t = allTrainees.find(t=>t.id===uid);
        if (t) t.tempPassword = newPw;
        showToast("Password updated in records. Note: this does NOT change their Firebase Auth password — they'll need to use this to log in only if you also reset it in Firebase Auth console.","info");
        // Refresh detail view
        document.getElementById(`detail-${uid}`).innerHTML = buildDetail(t, certMap[uid]||{});
      } catch(e) {
        showToast("Failed to save password.","error");
      }
    };

    window.toggleTrainee=function(uid){const d=document.getElementById(`detail-${uid}`),c=document.getElementById(`chev-${uid}`),h=d.previousElementSibling,o=d.classList.contains("open");d.classList.toggle("open",!o);c.classList.toggle("open",!o);h.classList.toggle("expanded",!o);};
    window.handleSignOff=async function(uid,sk,dk){try{await adminSignOffFn({traineeUid:uid,stepKey:sk,dateKey:dk});const s=await getDoc(doc(db,"certifications",uid));certMap[uid]=s.exists()?s.data():{};const u=await getDoc(doc(db,"users",uid));if(u.data()?.certified){const t=allTrainees.find(t=>t.id===uid);if(t)t.certified=true;showToast(`${t?.name} is Certified!`,"success");}else{showToast("Sign-off recorded.","success");}document.getElementById(`detail-${uid}`).innerHTML=buildDetail(allTrainees.find(t=>t.id===uid),certMap[uid]||{});}catch(e){showToast("Sign-off failed.","error");}};
    window.handleRevoke=async function(uid,sk,dk){if(!confirm("Revoke?"))return;try{await revokeSignOffFn({traineeUid:uid,stepKey:sk,dateKey:dk});const s=await getDoc(doc(db,"certifications",uid));certMap[uid]=s.exists()?s.data():{};const t=allTrainees.find(t=>t.id===uid);if(t)t.certified=false;showToast("Revoked.","info");document.getElementById(`detail-${uid}`).innerHTML=buildDetail(t,certMap[uid]||{});}catch(e){showToast("Failed.","error");}};

    // ── Resizable sidebar ─────────────────────────────────────────────────────
    (function() {
      const handle = document.getElementById("resize-handle");
      const sidebar = document.getElementById("content-sidebar");
      if (!handle || !sidebar) return;
      let isResizing = false, startX = 0, startWidth = 0;

      handle.addEventListener("mousedown", e => {
        isResizing = true;
        startX = e.clientX;
        startWidth = sidebar.offsetWidth;
        handle.classList.add("dragging");
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";
      });

      document.addEventListener("mousemove", e => {
        if (!isResizing) return;
        const newWidth = Math.min(500, Math.max(160, startWidth + (e.clientX - startX)));
        sidebar.style.width = newWidth + "px";
      });

      document.addEventListener("mouseup", () => {
        if (!isResizing) return;
        isResizing = false;
        handle.classList.remove("dragging");
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      });
    })();

    // Init empty editor state
    document.getElementById("editor-panel").innerHTML = `<div class="empty-editor"><div style="font-size:2rem;">✦</div><p>Select a module or sub-module<br>from the sidebar to edit.</p></div>`;
  </script>
</body>
</html>
